<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OCR 翻譯 — 批次模式</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Noto+Serif+TC:wght@300;400;600&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" integrity="sha384-ZZ1pncU3bQe8y31yfZdMFdSpttDoPmOZg2wguVK9almUodir1PghgT0eY7Mrty8H" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js" integrity="sha384-+mbV2IY1Zk/X1p/nWllGySJSUN8uMs+gUAN10Or95UBH0fpj6GfKgPmgC5EXieXG" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@4.2.1/dist/jspdf.umd.min.js" integrity="sha384-qovJwSBbRDPP5cEjCp8S0UP66wrvnjaa60XMOGzTNanrThcrGfXfnZkvgY8N1KT3" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js" integrity="sha384-Cck14aA9cifjYolcnjebXRfWGkz5ltHMBiG4px/j8GS+xQcb7OhNQWZYyWjQ+UwQ" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.umd.min.js" integrity="sha384-TcLTgu6flPhnZ5dfHnHimsxNFjYWN0povfGgnOvgPJKbZe6IbuoC2ociiatSHl9E" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js" integrity="sha384-vtjasyidUo0kW94K5MXDXntzOJpQgBKXmE7e2Ga4LG0skTTLeBi97eFAXsqewJjw" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #1a1a1a;
    --ink2: #555;
    --ink3: #999;
    --line: #e8e8e8;
    --bg: #fafaf8;
    --white: #ffffff;
    --accent: #2a6049;
    --accent-l: #e8f2ee;
    --zh-grad1: #237354;
    --zh-grad2: #3aab7a;
    --en-grad1: #1e4fa3;
    --en-grad2: #3d7fe8;
    --ja-grad1: #c0321f;
    --ja-grad2: #f05c42;
  }
  body {
    font-family: 'DM Sans', 'Zen Kaku Gothic New', 'Microsoft JhengHei', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
  }
  /* ── Header ── */
  header {
    width: 100%;
    padding: 20px 40px;
    border-bottom: 1px solid var(--line);
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--white);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-left { display: flex; align-items: center; gap: 16px; }
  header h1 {
    font-family: 'Noto Serif TC', serif;
    font-weight: 300;
    font-size: 1.3rem;
    letter-spacing: 0.06em;
    color: var(--ink);
  }
  .badge {
    background: linear-gradient(135deg, var(--zh-grad1), var(--zh-grad2));
    color: #fff;
    font-size: 0.62rem;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .batch-count {
    font-size: 0.78rem;
    color: var(--ink3);
    font-weight: 500;
    min-width: 100px;
    text-align: right;
  }
  .batch-count strong {
    color: var(--accent);
    font-size: 1.1rem;
    font-weight: 700;
  }
  .btn-settings {
    background: none;
    border: 1px solid var(--line);
    width: 34px; height: 34px;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.05rem;
    color: var(--ink3);
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .btn-settings:hover { border-color: var(--ink2); color: var(--ink); background: var(--bg); }
  /* ── Layout ── */
  .app-layout {
    display: flex;
    min-height: calc(100vh - 65px);
  }
  /* ── Main content ── */
  .main-content {
    flex: 1;
    padding: 28px 36px 120px;
    max-width: calc(100% - 110px);
  }
  /* ── Upload zone ── */
  .upload-zone {
    border: 1.5px dashed var(--line);
    border-radius: 14px;
    padding: 36px 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.25s, background 0.25s, transform 0.2s;
    background: var(--white);
    position: relative;
    overflow: hidden;
  }
  .upload-zone:hover,
  .upload-zone.drag-over {
    border-color: var(--accent);
    background: var(--accent-l);
    transform: scale(1.005);
  }
  .upload-zone.drag-over { border-width: 2.5px; }
  .upload-icon { font-size: 28px; margin-bottom: 8px; opacity: 0.5; }
  .upload-text { font-size: 0.86rem; color: var(--ink2); line-height: 1.7; }
  .upload-text strong { color: var(--ink); font-weight: 500; }
  .upload-hint { margin-top: 6px; font-size: 0.72rem; color: var(--ink3); }
  /* ── Batch Queue ── */
  .queue-section {
    margin-top: 24px;
  }
  .queue-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }
  .queue-title {
    font-size: 0.78rem;
    font-weight: 500;
    color: var(--ink2);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .queue-pill {
    background: var(--accent);
    color: #fff;
    font-size: 0.65rem;
    font-weight: 700;
    padding: 2px 9px;
    border-radius: 12px;
    min-width: 22px;
    text-align: center;
  }
  .btn-clear-queue {
    background: none;
    border: 1px solid var(--line);
    color: var(--ink3);
    font-family: inherit;
    font-size: 0.72rem;
    padding: 4px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-clear-queue:hover { border-color: #c0392b; color: #c0392b; }
  .queue-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
  }
  .queue-item {
    position: relative;
    width: 260px;
    height: 200px;
    border-radius: 10px;
    overflow: hidden;
    border: 1.5px solid var(--line);
    background: var(--white);
    cursor: default;
    transition: all 0.25s;
    animation: queuePop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes queuePop {
    0% { transform: scale(0.5) rotate(-5deg); opacity: 0; }
    100% { transform: scale(1) rotate(0); opacity: 1; }
  }
  .queue-item:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.08); }
  .queue-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .queue-item .remove-btn {
    position: absolute;
    top: 4px;
    right: 4px;
    width: 22px; height: 22px;
    background: rgba(0,0,0,0.6);
    color: #fff;
    border: none;
    border-radius: 50%;
    font-size: 0.7rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.15s;
    backdrop-filter: blur(4px);
  }
  .queue-item:hover .remove-btn { opacity: 1; }
  .queue-item .item-number {
    position: absolute;
    bottom: 4px;
    left: 4px;
    background: rgba(0,0,0,0.55);
    color: #fff;
    font-size: 0.6rem;
    font-weight: 700;
    padding: 1px 7px;
    border-radius: 8px;
    backdrop-filter: blur(4px);
  }
  .queue-item.processing {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--accent-l);
  }
  .queue-item.processing::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(42,96,73,0.15);
    animation: processingPulse 1s ease-in-out infinite;
  }
  @keyframes processingPulse {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 0.7; }
  }
  .queue-item.done { border-color: var(--accent); }
  .queue-item.done::after {
    content: '✓';
    position: absolute;
    inset: 0;
    background: rgba(42,96,73,0.5);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
    font-weight: 700;
  }
  .queue-empty {
    text-align: center;
    padding: 30px;
    color: var(--ink3);
    font-size: 0.82rem;
    border: 1.5px dashed var(--line);
    border-radius: 10px;
    background: var(--white);
  }
  /* ── Status ── */
  #status-text {
    text-align: center;
    font-size: 0.82rem;
    color: var(--ink3);
    min-height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    margin: 16px 0;
  }
  .spinner {
    width: 13px; height: 13px;
    border: 1.5px solid var(--line);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  /* ── Results area ── */
  .results-section { margin-top: 24px; }
  /* ── Export Toolbar ── */
  .export-toolbar {
    display: none;
    margin-top: 20px;
    padding: 16px 20px;
    background: var(--white);
    border: 1px solid var(--line);
    border-radius: 12px;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }
  .export-toolbar.visible { display: flex; }
  .export-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--ink3);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    white-space: nowrap;
  }
  .export-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn-export {
    background: var(--bg);
    border: 1px solid var(--line);
    color: var(--ink2);
    font-family: inherit;
    font-size: 0.76rem;
    font-weight: 500;
    padding: 7px 14px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    white-space: nowrap;
  }
  .btn-export:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-l); }
  .btn-export:disabled { opacity: 0.4; cursor: not-allowed; }
  .result-card {
    background: var(--white);
    border: 1px solid var(--line);
    border-radius: 14px;
    margin-bottom: 20px;
    overflow: hidden;
    animation: resultSlideIn 0.5s cubic-bezier(0.22, 1, 0.36, 1);
  }
  @keyframes resultSlideIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .result-header {
    padding: 12px 18px;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--bg);
  }
  .result-thumb {
    width: 48px; height: 36px;
    object-fit: cover;
    border-radius: 6px;
    border: 1px solid var(--line);
  }
  .result-meta {
    flex: 1;
    font-size: 0.78rem;
    color: var(--ink2);
    font-weight: 500;
  }
  .result-panels {
    display: grid;
    grid-template-columns: 1fr 1fr;
    min-height: 200px;
  }
  @media (max-width: 860px) {
    .result-panels { grid-template-columns: 1fr; }
  }
  .result-panel {
    padding: 18px 20px;
    overflow-y: auto;
    max-height: 60vh;
    font-size: 0.86rem;
    line-height: 1.75;
    font-family: 'Noto Serif TC', serif;
    color: var(--ink);
  }
  .result-panel + .result-panel { border-left: 1px solid var(--line); }
  @media (max-width: 860px) {
    .result-card { overflow: visible; }
    .result-panel + .result-panel { border-left: none; border-top: 1px solid var(--line); }
    .result-panel {
      max-height: none;
      overflow-y: visible;
      padding: 14px 12px;
      font-size: 0.82rem;
    }
    .panel-content {
      transform-origin: top left;
    }
    .result-panel table {
      table-layout: fixed;
      word-break: break-word;
    }
    .result-panel img {
      max-width: 100%;
      height: auto;
    }
    .result-panel pre {
      white-space: pre-wrap;
      word-break: break-word;
      overflow-x: hidden;
    }
  }
  .panel-content {
    outline: none;
    min-height: 2em;
    cursor: text;
  }
  .panel-content:focus {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
    border-radius: 4px;
  }
  .result-panel-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.68rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--ink3);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .result-panel-label .dot { width: 5px; height: 5px; border-radius: 50%; }
  .result-panel table { width: 100%; border-collapse: collapse; margin: 8px 0; }
  .result-panel td, .result-panel th { border: 1px solid var(--line); padding: 5px 8px; }
  .result-panel::-webkit-scrollbar { width: 4px; }
  .result-panel::-webkit-scrollbar-track { background: transparent; }
  .result-panel::-webkit-scrollbar-thumb { background: var(--line); border-radius: 2px; }
  /* ── Fullscreen Viewer ── */
  .viewer-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 9999;
    background: #ffffff;
    flex-direction: column;
  }
  .viewer-overlay.open { display: flex; }
  .viewer-toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 16px;
    background: #f5f5f5;
    border-bottom: 1px solid var(--line);
    flex-shrink: 0;
  }
  .viewer-toolbar button {
    background: none;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 0.85rem;
    font-family: inherit;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    color: var(--ink);
  }
  .viewer-toolbar button:active { background: var(--line); }
  .viewer-body {
    flex: 1;
    overflow: auto;
    -webkit-overflow-scrolling: touch;
    padding: 16px;
    font-family: 'Noto Serif TC', serif;
    font-size: 0.92rem;
    line-height: 1.8;
    color: var(--ink);
  }
  .viewer-body table { width: 100%; border-collapse: collapse; margin: 8px 0; }
  .viewer-body td, .viewer-body th { border: 1px solid var(--line); padding: 5px 8px; }
  .viewer-body img { max-width: 100%; height: auto; }
  .viewer-body pre { white-space: pre-wrap; word-break: break-word; }
  /* ── Sync scroll indicator ── */
  .sync-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 0.62rem;
    font-weight: 600;
    color: var(--ink3);
    background: var(--bg);
    border: 1px solid var(--line);
    padding: 2px 8px;
    border-radius: 10px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    user-select: none;
    cursor: pointer;
    transition: all 0.2s;
  }
  .sync-badge:hover { border-color: var(--ink2); color: var(--ink2); }
  .sync-badge .sync-icon {
    display: inline-block;
    transition: transform 0.3s;
  }
  .sync-badge.active { color: var(--accent); border-color: var(--accent); background: var(--accent-l); }
  .sync-badge.active .sync-icon { transform: rotate(0deg); }
  .sync-badge:not(.active) .sync-icon { transform: rotate(45deg); opacity: 0.5; }
  /* Scroll highlight pulse on synced panel */
  .result-panel.sync-flash {
    box-shadow: inset 0 0 0 1.5px var(--accent);
    transition: box-shadow 0.15s;
  }
  .result-actions {
    padding: 10px 18px;
    border-top: 1px solid var(--line);
    display: flex;
    gap: 6px;
    justify-content: flex-end;
    background: var(--bg);
  }
  /* ── Polish Button ── */
  .btn-polish {
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: linear-gradient(135deg, #f8f0e3 0%, #f2e6d0 100%);
    border: 1px solid #e0d1b8;
    color: #8a6d3b;
    font-family: 'Zen Kaku Gothic New', 'DM Sans', sans-serif;
    font-size: 0.72rem;
    font-weight: 600;
    padding: 5px 14px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.25s;
    overflow: hidden;
    letter-spacing: 0.02em;
  }
  .btn-polish:hover {
    background: linear-gradient(135deg, #f5ead8 0%, #eddbbc 100%);
    border-color: #c9b48e;
    box-shadow: 0 3px 12px rgba(138,109,59,0.15);
    transform: translateY(-1px);
  }
  .btn-polish:active { transform: scale(0.96); }
  .btn-polish .polish-icon { font-size: 0.85rem; }
  .btn-polish::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(108deg, transparent 30%, rgba(255,255,255,0.4) 50%, transparent 70%);
    background-size: 250% 100%;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  .btn-polish:hover::after { opacity: 1; animation: shimmer 2s linear infinite; }
  .btn-polish.polishing {
    pointer-events: none;
    background: linear-gradient(135deg, #fdf6e3 0%, #f5ecd3 100%);
    color: #b8943e;
    border-color: #d4c08a;
  }
  .btn-polish.polishing .polish-icon {
    animation: polishSpin 1s ease-in-out infinite;
  }
  @keyframes polishSpin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
  .btn-polish.done-polish {
    background: linear-gradient(135deg, #e8f2ee 0%, #d5ebdf 100%);
    border-color: #b8dcc8;
    color: var(--accent);
  }
  /* ── Polish diff indicator ── */
  .polish-indicator {
    display: none;
    align-items: center;
    gap: 4px;
    font-size: 0.6rem;
    font-weight: 600;
    color: #b8943e;
    letter-spacing: 0.04em;
    padding: 2px 8px;
    background: #fdf6e3;
    border: 1px solid #e8dbb8;
    border-radius: 10px;
  }
  .polish-indicator.visible { display: inline-flex; }
  /* ── Fixed Right Sidebar Buttons ── */
  .side-actions {
    position: fixed;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    z-index: 200;
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .action-btn {
    position: relative;
    width: 96px;
    padding: 22px 8px 18px;
    border: none;
    cursor: pointer;
    font-family: 'Zen Kaku Gothic New', 'DM Sans', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    overflow: hidden;
    transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    color: #fff;
  }
  .action-btn:first-child { border-radius: 18px 0 0 0; }
  .action-btn:last-child { border-radius: 0 0 0 18px; }
  .action-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(108deg, transparent 30%, rgba(255,255,255,0.2) 50%, transparent 70%);
    background-size: 250% 100%;
    animation: shimmer 3s linear infinite;
    pointer-events: none;
  }
  @keyframes shimmer {
    0%   { background-position: -250% center; }
    100% { background-position: 250% center; }
  }
  .action-btn.zh { background: linear-gradient(180deg, var(--zh-grad1), var(--zh-grad2)); }
  .action-btn.en { background: linear-gradient(180deg, var(--en-grad1), var(--en-grad2)); }
  .action-btn.ja { background: linear-gradient(180deg, var(--ja-grad1), var(--ja-grad2)); }
  .action-btn:hover {
    width: 110px;
    box-shadow: -8px 0 32px rgba(0,0,0,0.25);
  }
  .action-btn:active { transform: scale(0.92); }
  .action-flag { font-size: 1.8rem; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)); transition: transform 0.3s; }
  .action-btn:hover .action-flag { transform: scale(1.15) rotate(-5deg); }
  .action-label { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.04em; white-space: nowrap; }
  .action-sub { font-size: 0.55rem; opacity: 0.7; letter-spacing: 0.02em; }
  .action-btn.disabled {
    opacity: 0.4;
    pointer-events: none;
    filter: grayscale(0.5);
  }
  .action-btn.processing-btn {
    pointer-events: none;
  }
  .action-btn.processing-btn .action-flag {
    animation: flagSpin 0.6s ease-in-out infinite;
  }
  @keyframes flagSpin {
    0%, 100% { transform: rotate(0deg); }
    25% { transform: rotate(15deg); }
    75% { transform: rotate(-15deg); }
  }
  /* ── Toast / Reaction ── */
  .toast-container {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 9999;
    pointer-events: none;
  }
  .toast {
    background: rgba(10, 10, 10, 0.88);
    color: #fff;
    font-family: 'Zen Kaku Gothic New', 'Noto Serif TC', sans-serif;
    font-size: 1.6rem;
    font-weight: 700;
    padding: 20px 40px;
    border-radius: 20px;
    backdrop-filter: blur(12px);
    white-space: nowrap;
    text-align: center;
    animation: toastBoom 1.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    letter-spacing: 0.04em;
  }
  @keyframes toastBoom {
    0%   { opacity: 0; transform: scale(0.3) rotate(-8deg); }
    15%  { opacity: 1; transform: scale(1.15) rotate(2deg); }
    25%  { transform: scale(0.95) rotate(-1deg); }
    35%  { transform: scale(1.02) rotate(0); }
    70%  { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(0.8) translateY(-30px); }
  }
  /* ── Confetti ── */
  .confetti-piece {
    position: fixed;
    z-index: 9998;
    pointer-events: none;
    width: 10px;
    height: 10px;
    border-radius: 2px;
    animation: confettiFall 2s ease-out forwards;

  @keyframes confettiFall {
    0%   { opacity: 1; transform: translate(0, 0) rotate(0deg) scale(1); }
    100% { opacity: 0; transform: translate(var(--dx), var(--dy)) rotate(720deg) scale(0.3); }
  }
  /* ── Screen Shake ── */
  @keyframes screenShake {
    0%, 100% { transform: translate(0); }
    10% { transform: translate(-6px, 3px); }
    20% { transform: translate(5px, -4px); }
    30% { transform: translate(-3px, 6px); }
    40% { transform: translate(4px, -2px); }
    50% { transform: translate(-5px, 2px); }
    60% { transform: translate(3px, -5px); }
    70% { transform: translate(-2px, 4px); }
    80% { transform: translate(6px, -3px); }
    90% { transform: translate(-4px, 5px); }

  body.shaking { animation: screenShake 0.5s ease-in-out; }
  /* ── Emoji Rain ── */
  .emoji-rain {
    position: fixed;
    z-index: 9997;
    pointer-events: none;
    font-size: 2rem;

  /* ── btn-ghost ── */

  /* ── Progress Bar ── */
  .progress-bar-container {
    position: fixed;
    bottom: 0;

    right: 110px;

  /* ── Cancel Batch Button ── */

  /* ── Settings Modal ── */
  #settings-modal {

  .field-row-model {

  .field-input-select {

  .key-hint {

  @media (max-width: 700px) {

  /* ══════════════════════════════════
     ── Robot Mascots Stage (Simplified SVG) ──

  .robot-stage {
    position: fixed;
    bottom: 18px;
    left: 18px;
    z-index: 500;
    pointer-events: none;
    opacity: 0;
    transform: translateY(40px);
    transition: opacity 0.45s cubic-bezier(0.22, 1, 0.36, 1), transform 0.45s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .robot-stage.visible {
    opacity: 1;

  .robot {

    transition: all 0.3s ease;

  .robot.idle::after { animation: robotShadowFloat 3.2s ease-in-out infinite; }
  @keyframes robotShadowFloat {

    50% { transform: scale(0.84); opacity: 0.06; }
  }
  .robot-svg {
    width: 84px;
    height: 84px;
    overflow: visible;
    filter: drop-shadow(0 7px 16px rgba(17, 24, 22, 0.1));
    transition: transform 0.22s ease, filter 0.22s ease;
  }
  .robot-shell {
    fill: #ffffff;
    stroke: currentColor;
    stroke-width: 2.2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .robot-face {
    fill: rgba(255,255,255,0.94);
    stroke: currentColor;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;

  .robot-antenna,
  .robot-wave,
  .robot-mouth {
    fill: none;
    stroke: currentColor;
    stroke-width: 2.3;
    stroke-linecap: round;
    stroke-linejoin: round;

  .robot-accent {
    fill: none;
    stroke: currentColor;
    stroke-width: 2.2;

    stroke-linejoin: round;
  }
  .robot-eye {
    --eye-x: 0px;
    --eye-y: 0px;
    --eye-blink: 1;
    transform-box: fill-box;
    transform-origin: center;
    transition: transform 0.18s ease;
    transform: translate(var(--eye-x), var(--eye-y)) scaleY(var(--eye-blink));
    fill: #1a2621;
  }
  .robot-eye.blinking { --eye-blink: 0.16; }
  .robot.scanner { color: #2f88ca; }
  .robot.translator { color: #4d755f; }
  .robot.scanner .robot-shell { fill: #f7fcff; }
  .robot.translator .robot-shell { fill: #f6faf7; }
  .robot.scanner .robot-face { fill: rgba(79, 172, 254, 0.08); }

  .robot.scanner .robot-accent { fill: #67d9ff; stroke: none; }
  .robot .robot-mouth { stroke: #1a2621; }
  .robot .robot-mouth-talk {

    stroke-width: 2;
  }
  .robot .robot-mouth-surprised { fill: rgba(255,255,255,0.76); }
  .robot.scanner.active .robot-svg,

  }
  .robot.idle .robot-svg { animation: robotFloat 3.4s ease-in-out infinite; }
  @keyframes robotFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-4px); }
  }
  .robot.talking .robot-svg { animation: robotTalkBob 0.28s ease-in-out infinite alternate; }
  @keyframes robotTalkBob {
    from { transform: translateY(0) scale(1); }
    to { transform: translateY(-1.5px) scale(1.02, 0.99); }
  }
  .robot.scanner.waving .robot-wave { animation: robotWaveRight 0.5s ease-in-out 3; }
  .robot.translator.waving .robot-wave { animation: robotWaveLeft 0.5s ease-in-out 3; }
  .robot.excited .robot-svg { animation: robotExcited 0.38s ease-in-out infinite alternate; }
  @keyframes robotWaveRight {
    0%, 100% { transform: rotate(0deg); transform-origin: 78px 54px; }
    50% { transform: rotate(-14deg); transform-origin: 78px 54px; }
  }
  @keyframes robotWaveLeft {
    0%, 100% { transform: rotate(0deg); transform-origin: 18px 54px; }
    50% { transform: rotate(14deg); transform-origin: 18px 54px; }
  }
  @keyframes robotExcited {
    from { transform: translateY(-1px) rotate(-1deg); }
    to { transform: translateY(-3px) rotate(1deg); }
  }
  .robot .robot-mouth-talk,
  .robot .robot-mouth-happy,
  .robot .robot-mouth-surprised {
    display: none;
  }
  .robot.happy .robot-mouth-neutral,
  .robot.surprised .robot-mouth-neutral,
  .robot.talking .robot-mouth-neutral {
    display: none;
  }
  .robot.happy .robot-mouth-happy { display: block; }
  .robot.surprised .robot-mouth-surprised { display: block; }

  // ══════════════════════════════════
  // ── HTML Sanitizer (XSS Protection) ──
  // ══════════════════════════════════
  function sanitizeHtml(dirty) {
    // Create an inert document fragment via <template>
    const template = document.createElement('template');
    template.innerHTML = dirty;

    // Remove dangerous tags
    const dangerousTags = 'script,iframe,object,embed,form,input,textarea,select,button,link,meta,base,applet,style';
    template.content.querySelectorAll(dangerousTags).forEach(el => el.remove());

    // Scrub dangerous attributes from all elements
    template.content.querySelectorAll('*').forEach(el => {
      const attrs = [...el.attributes];
      for (const attr of attrs) {
        const name = attr.name.toLowerCase();
        const value = (attr.value || '').toLowerCase().trim();
        // Remove all event handlers
        if (name.startsWith('on')) {
          el.removeAttribute(attr.name);
          continue;
        }
        // Remove javascript: URLs
        if ((name === 'src' || name === 'href' || name === 'action' || name === 'xlink:href') &&
            /^\s*javascript\s*:/i.test(attr.value)) {
          el.removeAttribute(attr.name);
          continue;
        }
        // Remove data: URLs on src (except images)
        if (name === 'src' && /^\s*data\s*:/i.test(attr.value) && !/^\s*data\s*:\s*image\//i.test(attr.value)) {
          el.removeAttribute(attr.name);
          continue;
        }
      }
      // Remove SVG dangerous elements inside SVG
      if (el.tagName && ['FOREIGNOBJECT', 'SET', 'ANIMATE', 'ANIMATETRANSFORM'].includes(el.tagName.toUpperCase())) {
        el.remove();
      }
    });

    return template.innerHTML;
  }

  // ══════════════════════════════════
  // ── Safe API Response Parser ──
  // ══════════════════════════════════
  function extractModelText(data) {
    if (data?.error) {
      throw new Error(data.error.message || 'API error');
    }
    const candidates = data?.candidates;
    if (!candidates || candidates.length === 0) {
      const blockReason = data?.promptFeedback?.blockReason;
      throw new Error(blockReason ? `Blocked: ${blockReason}` : 'No candidates returned');
    }
    const candidate = candidates[0];
    if (candidate.finishReason === 'MAX_TOKENS') {
      throw new Error('回應被截斷（MAX_TOKENS），內容不完整');
    } else if (candidate.finishReason && candidate.finishReason !== 'STOP') {
      throw new Error(`Response filtered: ${candidate.finishReason}`);
    }
    const text = candidate?.content?.parts
      ?.map(part => part.text || '')
      .join('')
      .trim();
    if (!text) {
      throw new Error('Model returned empty text');
    }
    return text.replace(/```html|```/g, '').trim();
  }

  // ══════════════════════════════════
  // ── Centralized Gemini API Caller (with retries & backoff) ──
  // ══════════════════════════════════
  function getApiKey() { return localStorage.getItem(STORAGE_KEY) || ''; }
  function getModel() { return localStorage.getItem(STORAGE_MODEL_KEY) || DEFAULT_MODEL; }

  function abortableSleep(ms, signal) {
    return new Promise((resolve, reject) => {
      if (signal?.aborted) { reject(new DOMException('Aborted', 'AbortError')); return; }
      const timer = setTimeout(resolve, ms);
      signal?.addEventListener('abort', () => { clearTimeout(timer); reject(new DOMException('Aborted', 'AbortError')); }, { once: true });
    });
  }

  async function callGemini(parts, { signal, model: modelOverride, systemInstruction } = {}) {
    const key = getApiKey();
    const model = modelOverride || getModel();
    const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`;

    let lastError;
    for (let attempt = 0; attempt < MAX_RETRIES; attempt++) {
      if (signal?.aborted) throw new DOMException('Aborted', 'AbortError');

      try {
        const reqBody = { contents: [{ parts }] };
        if (systemInstruction) {
          reqBody.systemInstruction = { parts: [{ text: systemInstruction }] };
        }
        const res = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(reqBody),
          signal,
        });

        // Retry on 429 / 502 / 503 with exponential backoff
        if (res.status === 429 || res.status === 502 || res.status === 503) {
          const wait = Math.min(1000 * Math.pow(2, attempt) + Math.random() * 500, 16000);
          await abortableSleep(wait, signal);
          lastError = new Error(`HTTP ${res.status} (retry ${attempt + 1}/${MAX_RETRIES})`);
          continue;
        }

        // Non-retryable client errors (400, 401, 403, 404…) — fail immediately
        if (res.status >= 400 && res.status < 500) {
          const data = await res.json().catch(() => ({}));
          const err = new Error(data?.error?.message || `HTTP ${res.status}`);
          err.nonRetryable = true;
          throw err;
        }

        const data = await res.json();
        return extractModelText(data);

      } catch (err) {
        if (err.name === 'AbortError') throw err;
        if (err.nonRetryable) throw err;
        lastError = err;
        if (attempt < MAX_RETRIES - 1) {
          const wait = Math.min(1000 * Math.pow(2, attempt), 8000);
          await abortableSleep(wait, signal);
        }
      }
    }
    throw lastError || new Error('Max retries exceeded');
  }

  // ══════════════════════════════════
  // ── Queue Management ──
  // ══════════════════════════════════
  function updateQueueUI() {
    const count = imageQueue.length;
    queuePill.textContent = count + (pendingReaders > 0 ? `+${pendingReaders}` : '');
    batchCountEl.innerHTML = count > 0 ? `待翻譯：<strong>${count}</strong> 張` : '';
    queueEmpty.style.display = count === 0 && pendingReaders === 0 ? 'block' : 'none';
    const btns = document.querySelectorAll('.action-btn');
    btns.forEach(btn => {
      if (count > 0 && !isProcessing && pendingReaders === 0) {
        btn.classList.remove('disabled');
      } else {
        btn.classList.add('disabled');
      }
    });
  }

  function addToQueue(file) {
    // ── File count limit（含 pending 中的）──
    if (imageQueue.length + pendingReaders >= MAX_FILES) {
      showToast(`最多 ${MAX_FILES} 張圖片！`);
      return;
    }
    // ── File size limit ──
    if (file.size > MAX_FILE_SIZE) {
      showToast(`${file.name} 超過 10MB，已跳過`);
      return;
    }

    const id = ++queueIdCounter;
    const blobUrl = URL.createObjectURL(file);
    const myEpoch = queueEpoch;
    pendingReaders++;
    updateQueueUI(); // disable buttons while readers pending

    const reader = new FileReader();
    reader.onloadend = () => {
      pendingReaders--;
      // 若 clearQueue 已被��叫（epoch 變了），丟棄結果
      if (myEpoch !== queueEpoch) {
        try { URL.revokeObjectURL(blobUrl); } catch(e) {}
        updateQueueUI();
        return;
      }
      // 再次檢查上限（防止並行 readers 超額）
      if (imageQueue.length >= MAX_FILES) {
        try { URL.revokeObjectURL(blobUrl); } catch(e) {}
        showToast(`最多 ${MAX_FILES} 張圖片！`);
        updateQueueUI();
        return;
      }
      const base64 = reader.result.split(',')[1];
      const item = { id, file, base64, mimeType: file.type, blobUrl };
      imageQueue.push(item);
      const el = document.createElement('div');
      el.className = 'queue-item';
      el.id = `queue-item-${id}`;
      const img = document.createElement('img');
      img.src = blobUrl;
      img.alt = `圖片 ${id}`;
      const removeBtn = document.createElement('button');
      removeBtn.className = 'remove-btn';
      removeBtn.textContent = '✕';
      removeBtn.onclick = () => removeFromQueue(id);
      const numSpan = document.createElement('span');
      numSpan.className = 'item-number';
      numSpan.textContent = `#${imageQueue.length}`;
      el.append(img, removeBtn, numSpan);
      queueGrid.appendChild(el);
      updateQueueUI();
    };
    reader.readAsDataURL(file);
  }

  function removeFromQueue(id) {
    const removed = imageQueue.find(i => i.id === id);
    if (removed) {
      // Only revoke if NOT already used in a result card
      if (removed.blobUrl && !renderedBlobUrls.has(removed.blobUrl)) {
        try { URL.revokeObjectURL(removed.blobUrl); } catch(e) {}
      }
      removed.base64 = null;
      removed.file = null;
    }
    imageQueue = imageQueue.filter(i => i.id !== id);
    const el = document.getElementById(`queue-item-${id}`);
    if (el) {
      el.style.transition = 'all 0.25s';
      el.style.transform = 'scale(0) rotate(10deg)';
      el.style.opacity = '0';
      setTimeout(() => {
        el.remove();
        document.querySelectorAll('.queue-item .item-number').forEach((n, i) => {
          n.textContent = `#${i + 1}`;
        });
        updateQueueUI();
      }, 250);
    }
  }

  function clearQueue() {
    queueEpoch++; // invalidate any in-flight FileReaders
    imageQueue.forEach(item => {
      // Only revoke blob URLs NOT used in rendered result cards
      if (item.blobUrl && !renderedBlobUrls.has(item.blobUrl)) {
        try { URL.revokeObjectURL(item.blobUrl); } catch(e) {}
      }
      item.base64 = null;
      item.file = null;
    });
    imageQueue = [];
    queueIdCounter = 0;
    // pendingReaders 不歸零，讓 onloadend 自行遞減並因 epoch 不符而丟棄
    queueGrid.querySelectorAll('.queue-item').forEach(el => el.remove());
    updateQueueUI();
  }

  // ── Natural blinking with recursive setTimeout ──
  function startBlinking() {
    stopBlinking();

        scheduleBlink();

  let speechEpoch = 0;  // race-condition guard

  async function addSpeech(who, text, duration) {
    return new Promise(resolve => {
      speechQueue.push({ who, text, duration: duration || 2800, resolve });
      if (!speechBusy) drainSpeechQueue();
    });
  }

  async function drainSpeechQueue() {
    if (speechBusy || speechQueue.length === 0) return;
    speechBusy = true;
    const myEpoch = speechEpoch;
    while (speechQueue.length > 0 && myEpoch === speechEpoch) {
      const { who, text, duration, resolve } = speechQueue.shift();
      await showBubble(who, text, duration);
      resolve();
    }
    if (myEpoch === speechEpoch) speechBusy = false;
  }

  function cycleBubble(limit = 2) {
    return new Promise(resolve => {
      if (speechArea.children.length < limit) {
        resolve();
        return;
      }
      const oldest = speechArea.children[0];
      if (!oldest) {
        resolve();
        return;
      }
      oldest.classList.add('fadeout');
      setTimeout(() => {
        if (oldest.parentNode) oldest.remove();
        resolve();
      }, 160);
    });
  }

  async function showBubble(who, text, duration) {
    await cycleBubble(2);
    return new Promise(resolve => {
      const isScanner = who === 'scanner';
      const bot = isScanner ? scannerBot : translatorBot;
      const otherBot = isScanner ? translatorBot : scannerBot;
      setRobotMood(bot, ['active', 'talking', isScanner ? 'looking-right' : 'looking-left']);
      setRobotMood(otherBot, ['idle', isScanner ? 'looking-left' : 'looking-right']);
      const bubble = document.createElement('div');
      bubble.className = `speech-bubble ${who}-bubble`;
      bubble.textContent = text;
      speechArea.appendChild(bubble);
      const talkTime = Math.min(text.length * 70, 1500);
      setTimeout(() => {
        setRobotMood(bot, ['active', 'happy', isScanner ? 'looking-right' : 'looking-left']);
      }, talkTime);
      setTimeout(resolve, duration);
    });
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function clearAllBubbles() {
    speechEpoch++;          // invalidate any in-flight drain
    const stale = speechQueue.splice(0);
    stale.forEach(item => item.resolve());  // unblock any awaiting callers
    speechBusy = false;
    speechArea.innerHTML = '';
  }

  let _idleChatTimer = null;
  let _idleChatActive = false;

  function startIdleChat() {
    if (_idleChatActive) return;
    _idleChatActive = true;
    const usedIndices = new Set();
    const schedule = () => {
      if (!_idleChatActive) return;
      const delay = 4000 + Math.random() * 4000;
      _idleChatTimer = setTimeout(async () => {
        if (!_idleChatActive) return;
        if (usedIndices.size >= idleChatPairs.length) usedIndices.clear();
        let idx;
        do { idx = Math.floor(Math.random() * idleChatPairs.length); } while (usedIndices.has(idx));
        usedIndices.add(idx);
        const pair = idleChatPairs[idx];
        for (const line of pair) {
          if (!_idleChatActive) return;
          await addSpeech(line.who, line.text, 2800);
        }
        schedule();
      }, delay);
    };
    schedule();
  }

  function stopIdleChat() {
    _idleChatActive = false;
    if (_idleChatTimer) { clearTimeout(_idleChatTimer); _idleChatTimer = null; }
  }

  async function callGeminiOCR(base64Data, mimeType, signal) {
    const sysInstr = `You are an expert Frontend Developer specializing in converting images to high-fidelity HTML.`;
    const prompt = `Convert this image to high-fidelity HTML.
Rules:
1. Use inline CSS for layout (flex/grid).
2. Match colors, fonts, and positions as closely as possible.
3. If the text in the image is written vertically (top-to-bottom), you MUST use CSS "writing-mode: vertical-rl" on those text elements to preserve the vertical layout.
4. Return ONLY raw HTML string. No markdown, no code fences.`;

    return callGemini([
      { text: prompt },
      { inline_data: { mime_type: mimeType, data: base64Data } }
    ], { signal, systemInstruction: sysInstr });
  }

  async function callGeminiTranslate(html, lang, signal) {
    let localeRule = '';
    if (/chinese/i.test(lang)) {
      localeRule = '\n3. Use Taiwan Traditional Chinese phrasing (not Mainland China/HK usage).';
    } else if (/japanese/i.test(lang)) {
      localeRule = '\n3. Use natural, native Japanese (日本語) phrasing. Output MUST be in Japanese, NOT Chinese.';
    } else if (/english/i.test(lang)) {
      localeRule = '\n3. Use natural, fluent English phrasing.';
    } else {
      localeRule = `\n3. Use natural, native ${lang} phrasing.`;
    }
    const sysInstr = `You are a Localization Engineer. Your job is to translate HTML content while preserving all markup structure exactly.`;
    const prompt = `Target language: ${lang}.
Source HTML:
${html}
Rules:
1. Keep all HTML structure, classes, and inline styles EXACTLY the same.
2. Only translate visible text content.${localeRule}
4. Return ONLY raw HTML string. No markdown, no code fences.`;

    return callGemini([{ text: prompt }], { signal, systemInstruction: sysInstr });
  }

  async function callGeminiPolish(sourceHtml, translatedHtml, lang, signal) {
    const sysInstr = `You are a senior translation editor and quality assurance specialist. Your job is to polish and elevate existing translations through deep revision along three axes: Precision, Localization, and Fluency.`;
    const prompt = `## Step 1: Deep Comprehension
First, carefully re-read the source text to fully understand:
- The overall meaning, intent, and nuance of the original
- Any domain-specific terminology or context
- The tone, register, and rhetorical purpose

## Source HTML (original text):
${sourceHtml}

## Current Translation (${lang}):
${translatedHtml}

## Step 2: Three-Axis Quality Enhancement
Revise the translation along these three axes:

### Axis 1 — Precision (精準度)
- Fix any mistranslations, omissions, or additions
- Ensure numbers, proper nouns, and technical terms are correct
- Verify that the meaning faithfully reflects the source

### Axis 2 — Localization (在地化)
- Use natural phrasing for the target locale
- For Traditional Chinese (Taiwan): use Taiwan-standard vocabulary, measure words, and expressions; strictly avoid Mainland China or Hong Kong phrasing
- Adapt cultural references, units, or idioms appropriately for the target audience

### Axis 3 — Fluency & Naturalness (流暢自然度)
- Ensure the text reads as if originally written in the target language
- Improve sentence rhythm, flow, and cohesion
- Remove translationese — awkward calques, unnatural word order, or overly literal constructions
- Maintain consistency in style and tone throughout

## Output Rules:
1. Keep ALL HTML structure, tags, classes, and inline styles EXACTLY the same as the current translation
2. Only modify the visible text content
3. Return ONLY the revised raw HTML string. No markdown, no code fences, no explanations.`;

    return callGemini([{ text: prompt }], { signal, model: 'gemini-3-flash-preview', systemInstruction: sysInstr });
  }

  function cancelBatch() {

  async function startBatch(lang) {
    if (imageQueue.length === 0 || isProcessing) return;
    if (!getApiKey()) {
      showToast('先設定 API Key 啦！⚙️');
      shakeScreen();
      return;
    }

    isProcessing = true;
    lastUsedLang = lang;
    batchAbortController = new AbortController();
    const signal = batchAbortController.signal;
    const r = reactions[lang];
    const totalSteps = imageQueue.length * 3; // OCR + Translate + Polish
    let completedSteps = 0;

    // Show cancel button
    btnCancelBatch.classList.add('visible');

    // Epic start reaction
    showToast(randomPick(r.start));
    shakeScreen();
    emojiRain(r.emoji, 6);

    document.querySelectorAll('.action-btn').forEach(btn => {
      btn.classList.add('disabled', 'processing-btn');
    });

    progressContainer.classList.add('active');
    progressBar.style.width = '0%';

    const items = [...imageQueue];

    // Robots greet (awaited for ordering)
    await robotGreeting();

    let cancelled = false;

    for (let i = 0; i < items.length; i++) {
      if (signal.aborted) { cancelled = true; break; }

      const item = items[i];
      const queueEl = document.getElementById(`queue-item-${item.id}`);
      if (queueEl) queueEl.classList.add('processing');

      setStatus('spinner', `OCR 辨識中… (${i + 1}/${items.length})`);

      // Robot: OCR start (fire-and-forget, don't block API call)
      robotOcrStart(i + 1, items.length);

      let ocrHtml = '';
      try {
        ocrHtml = await callGeminiOCR(item.base64, item.mimeType, signal);
        completedSteps++;
        progressBar.style.width = `${(completedSteps / totalSteps) * 100}%`;
      } catch (err) {
        if (err.name === 'AbortError') { cancelled = true; break; }
        if (queueEl) queueEl.classList.remove('processing');
        await robotError(err.message);
        appendResultCard(item, `<div style="color:#c0392b">OCR 失敗：${escapeHtml(err.message)}</div>`, '', i + 1);
        completedSteps += 3; // skip OCR + Translate + Polish
        progressBar.style.width = `${(completedSteps / totalSteps) * 100}%`;
        item.base64 = null;
        continue;
      }

      // Free base64 memory immediately after OCR
      item.base64 = null;

      // Robot: OCR done (fire-and-forget)
      robotOcrDone();

      if (signal.aborted) { cancelled = true; break; }

      setStatus('spinner', `翻譯中… (${i + 1}/${items.length})`);

      // Robot: Translate start (fire-and-forget)
      robotTranslateStart();

      let transHtml = '';
      let translationOk = false;
      try {
        transHtml = await callGeminiTranslate(ocrHtml, lang, signal);
        translationOk = true;
        completedSteps++;
        progressBar.style.width = `${(completedSteps / totalSteps) * 100}%`;
      } catch (err) {
        if (err.name === 'AbortError') { cancelled = true; break; }
        transHtml = `<div style="color:#c0392b">翻譯失敗：${escapeHtml(err.message)}</div>`;
        completedSteps += 2; // skip Translate + Polish
        progressBar.style.width = `${(completedSteps / totalSteps) * 100}%`;
      }

      const finalOcr = ocrHtml;
      ocrHtml = null;

      // Robot: Translate done (fire-and-forget)
      robotTranslateDone();

      // ── Auto-polish ──
      let polished = false;
      if (translationOk && !signal.aborted) {
        setStatus('spinner', `潤稿中… (${i + 1}/${items.length})`);
        // Robot: Polish start (fire-and-forget)
        robotPolishStart();
        try {
          const polishedHtml = await callGeminiPolish(finalOcr, transHtml, lang, signal);
          transHtml = polishedHtml;
          polished = true;
        } catch (err) {
          if (err.name === 'AbortError') { cancelled = true; break; }
          // Polish failed — keep original translation, not a fatal error
        }
        completedSteps++;
        progressBar.style.width = `${(completedSteps / totalSteps) * 100}%`;
      }

      if (queueEl) {
        queueEl.classList.remove('processing');
        queueEl.classList.add('done');
      }

      appendResultCard(item, finalOcr, transHtml, i + 1);

      // Mark polish indicator if polished
      if (polished) {
        const lastCard = resultsSection.lastElementChild;
        if (lastCard) {
          const polishInd = lastCard.querySelector('.polish-indicator');
          if (polishInd) polishInd.classList.add('visible');
          const polishBtn = lastCard.querySelector('.btn-polish');
          if (polishBtn) {
            polishBtn.classList.add('done-polish');
            polishBtn.innerHTML = '<span class="polish-icon">✨</span> 再次潤稿';
          }
        }
      }
    }

    // Hide cancel button
    btnCancelBatch.classList.remove('visible');

    if (cancelled) {
      setStatus('', '⏹ 已取消');
      showToast('批次已取消 ⏹');
      hideRobots();
    } else {
      // Epic done reaction
      setTimeout(() => {
        showToast(randomPick(r.done));
        spawnConfetti(20);
        emojiRain('🎉', 5);
      }, 300);
      // Robot: All done (awaited)
      await robotAllDone(items.length);
      setStatus('', `✓ 全部完成！共 ${items.length} 張`);
    }

    progressBar.style.width = '100%';
    setTimeout(() => { progressContainer.classList.remove('active'); }, 1500);

    isProcessing = false;
    batchAbortController = null;

    if (cancelled) {
      // Only remove processed/partial items; keep unprocessed items in queue
      const doneIds = new Set();
      queueGrid.querySelectorAll('.queue-item.done, .queue-item.processing').forEach(el => {
        const id = parseInt(el.id.replace('queue-item-', ''));
        if (!isNaN(id)) doneIds.add(id);
        el.remove();
      });
      imageQueue = imageQueue.filter(item => {
        if (doneIds.has(item.id)) {
          if (item.blobUrl && !renderedBlobUrls.has(item.blobUrl)) {
            try { URL.revokeObjectURL(item.blobUrl); } catch(e) {}
          }
          item.base64 = null;
          item.file = null;
          return false;
        }
        return true;
      });
      // Re-number remaining queue items
      document.querySelectorAll('.queue-item .item-number').forEach((n, i) => {
        n.textContent = `#${i + 1}`;
      });
    } else {
      clearQueue();
    }

    document.querySelectorAll('.action-btn').forEach(btn => {
      btn.classList.remove('processing-btn');
    });
    updateQueueUI();
  }

  // ══════════════════════════════════
  function appendResultCard(item, ocrHtml, transHtml, index) {
    while (resultsSection.children.length >= MAX_RESULT_CARDS) {
      const oldest = resultsSection.children[0];
      const oldPanels = oldest.querySelector('.result-panels');
      if (oldPanels?.id && syncState[oldPanels.id]) {
        delete syncState[oldPanels.id];
      }
      // Revoke blob URL used by this card to free memory
      const oldThumb = oldest.querySelector('.result-thumb');
      if (oldThumb?.src && oldThumb.src.startsWith('blob:')) {
        renderedBlobUrls.delete(oldThumb.src);
        try { URL.revokeObjectURL(oldThumb.src); } catch(e) {}
      }
      oldest.remove();
      showToast('已移除最舊的結果以節省記憶體 🗑️');
    }

    // Track this blob URL as "rendered" — do not revoke it
    if (item.blobUrl) renderedBlobUrls.add(item.blobUrl);

    // ── Sanitize model-generated HTML ──
    const safeOcrHtml = sanitizeHtml(ocrHtml);
    const safeTransHtml = sanitizeHtml(transHtml);

    const card = document.createElement('div');
    card.className = 'result-card';
    const cardId = `result-${Date.now()}-${index}`;
    card.dataset.lang = lastUsedLang;

    card.innerHTML = `
      <div class="result-header">
        <img class="result-thumb" src="${item.blobUrl}" alt="">
        <div class="result-meta">圖片 #${index}</div>
        <div style="display:flex;gap:6px;align-items:center;">
          <span class="sync-badge active" id="sync-${cardId}" onclick="toggleSync('${cardId}')" title="同步滾動">
            <span class="sync-icon">🔗</span> 同步
          </span>
          <button class="btn-ghost" onclick="copyResult('${cardId}', 'ocr')">複製原文</button>
          <button class="btn-ghost" onclick="copyResult('${cardId}', 'trans')">複製譯文</button>
          <button class="btn-ghost" onclick="downloadResultImage('${cardId}', ${index}, event)">📥 下載圖</button>
        </div>
      </div>
      <div class="result-panels" id="${cardId}">
        <div class="result-panel" data-type="ocr">
          <div class="result-panel-label"><span class="dot" style="background:#aaa"></span>原文 OCR</div>
          <div class="panel-content" contenteditable="true" role="textbox" aria-label="原文 OCR" aria-multiline="true">${safeOcrHtml}</div>
        </div>
        <div class="result-panel" data-type="trans">
          <div class="result-panel-label" style="justify-content:space-between;">
            <span style="display:flex;align-items:center;gap:6px;">
              <span class="dot" style="background:var(--accent)"></span>譯文
              <span class="polish-indicator" id="polish-ind-${cardId}">✨ 已潤稿</span>
            </span>
            <button class="btn-polish" id="polish-btn-${cardId}" onclick="polishTranslation('${cardId}')">
              <span class="polish-icon">✨</span> 潤稿
            </button>
          </div>
          <div class="panel-content" contenteditable="true" role="textbox" aria-label="譯文" aria-multiline="true">${safeTransHtml}</div>
        </div>
      </div>
    `;
    resultsSection.appendChild(card);
    fitPanelContent(card);
    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    setupSyncScroll(cardId);
    updateExportToolbar();
  }

  function fitPanelContent(card) {
    card.querySelectorAll('.panel-content').forEach(pc => {
      pc.style.transform = '';
      pc.style.height = '';
      requestAnimationFrame(() => {
        const panelWidth = pc.parentElement.clientWidth - 24;
        const contentWidth = pc.scrollWidth;
        if (contentWidth > panelWidth && contentWidth > 0) {
          const scale = panelWidth / contentWidth;
          pc.style.transform = `scale(${scale})`;
          pc.style.transformOrigin = 'top left';
          pc.style.height = (pc.scrollHeight * scale) + 'px';
        }
      });
    });
  }

  window.addEventListener('resize', () => {
    document.querySelectorAll('.result-card').forEach(fitPanelContent);
  });

  // ══════════════════════════════════
  // ── Sync Scroll System ──
  // ══════════════════════════════════
  const syncState = {};

  function setupSyncScroll(cardId) {
    const container = document.getElementById(cardId);
    if (!container) return;
    const panels = container.querySelectorAll('.result-panel');
    if (panels.length < 2) return;
    const ocrPanel = panels[0];
    const transPanel = panels[1];
    syncState[cardId] = { enabled: true, busy: false };

    function getScrollRatio(el) {
      const maxScroll = el.scrollHeight - el.clientHeight;
      return maxScroll > 0 ? el.scrollTop / maxScroll : 0;
    }
    function applyScrollRatio(el, ratio) {
      const maxScroll = el.scrollHeight - el.clientHeight;
      el.scrollTop = ratio * maxScroll;
    }

    ocrPanel.addEventListener('scroll', () => {
      const s = syncState[cardId];
      if (!s || !s.enabled || s.busy) return;
      s.busy = true;
      const ratio = getScrollRatio(ocrPanel);
      applyScrollRatio(transPanel, ratio);
      requestAnimationFrame(() => { s.busy = false; });
    });
    transPanel.addEventListener('scroll', () => {
      const s = syncState[cardId];
      if (!s || !s.enabled || s.busy) return;
      s.busy = true;
      const ratio = getScrollRatio(transPanel);
      applyScrollRatio(ocrPanel, ratio);
      requestAnimationFrame(() => { s.busy = false; });
    });
  }

  function toggleSync(cardId) {
    const s = syncState[cardId];
    if (!s) return;
    s.enabled = !s.enabled;
    const badge = document.getElementById(`sync-${cardId}`);
    if (badge) badge.classList.toggle('active', s.enabled);
    if (s.enabled) {
      const container = document.getElementById(cardId);
      if (container) {
        container.querySelectorAll('.result-panel').forEach(p => {
          p.classList.add('sync-flash');
          setTimeout(() => p.classList.remove('sync-flash'), 400);
        });
      }
      showToast('同步滾動：開啟 🔗');
    } else {
      showToast('同步滾動：關閉 🔓');
    }
  }

  // ══════════════════════════════════
  // ── Copy (with clipboard fallback) ──
  // ══════════════════════════════════
  async function copyResult(cardId, type) {
    const panel = document.querySelector(`#${cardId} [data-type="${type}"]`);
    if (!panel) return;
    const content = panel.cloneNode(true);
    content.querySelector('.result-panel-label')?.remove();
    try {
      if (window.ClipboardItem && navigator.clipboard?.write) {
        const blob = new Blob([content.innerHTML], { type: 'text/html' });
        const textBlob = new Blob([content.innerText], { type: 'text/plain' });
        await navigator.clipboard.write([
          new ClipboardItem({ 'text/html': blob, 'text/plain': textBlob })
        ]);
      } else {
        await navigator.clipboard.writeText(content.innerText);
      }
      showToast('已複製！📋');
    } catch {
      // Last-resort fallback
      try { await navigator.clipboard.writeText(content.innerText); showToast('已複製！📋'); }
      catch { showToast('複製失敗 😢'); }
    }
  }

  async function shareViewerImage() {
    const shareBtn = viewerOverlay.querySelector('.viewer-toolbar button:last-child');
    if (shareBtn) { shareBtn.disabled = true; shareBtn.textContent = '處理中…'; }
    try {
      // Clone viewer body offscreen for safe capture
      const wrapper = document.createElement('div');
      wrapper.style.cssText = 'position:fixed;left:-9999px;top:0;width:1000px;z-index:-1;background:#fff;padding:16px;';
      const clone = viewerBody.cloneNode(true);
      clone.style.cssText = 'font-family:"Noto Serif TC",serif;font-size:0.92rem;line-height:1.8;color:#1a1a1a;';
      // Fix vertical text for html2canvas
      flattenVerticalText(clone);
      wrapper.appendChild(clone);
      document.body.appendChild(wrapper);
      await new Promise(r => setTimeout(r, 100));

      let canvas;
      try {
        canvas = await html2canvas(clone, {
          scale: 2,
          useCORS: true,
          backgroundColor: '#ffffff',
          scrollX: 0,
          scrollY: 0,
          width: clone.scrollWidth,
          height: clone.scrollHeight
        });
      } finally {
        if (wrapper.parentNode) document.body.removeChild(wrapper);
      }

      const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
      const file = new File([blob], 'OCR_result.png', { type: 'image/png' });

      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file], title: 'OCR 翻譯結果' });
      } else {
        // Fallback: download
        const link = document.createElement('a');
        link.download = 'OCR_result.png';
        link.href = URL.createObjectURL(blob);
        link.click();
        URL.revokeObjectURL(link.href);
        showToast('已下載圖片（此裝置不支援直接分享）');
      }
    } catch (err) {
      if (err.name !== 'AbortError') {
        console.error('Share failed:', err);
        showToast('分享失敗 😢');
      }
    }
    if (shareBtn) { shareBtn.disabled = false; shareBtn.textContent = '📤 分享'; }
  }

  // Delegate: tap on result-panel content opens viewer
  document.addEventListener('click', function(e) {
    const panel = e.target.closest('.result-panel');
    if (!panel) return;
    // Don't trigger on buttons, labels, editable areas, or interactive elements
    if (e.target.closest('button, .btn-polish, .result-panel-label, .polish-indicator, a, input, textarea, select, [contenteditable]')) return;
    // Only on mobile
    if (window.innerWidth > 860) return;

  });

  // Convert writing-mode:vertical elements to html2canvas-safe layout
  function flattenVerticalText(el) {
    el.querySelectorAll('*').forEach(node => {
      // Prioritize inline style (Gemini outputs inline CSS), fallback to computed
      const inlineWM = node.style.writingMode || '';
      let wm = inlineWM;
      if (!wm) {
        try { wm = window.getComputedStyle(node).writingMode || ''; } catch(e) {}
      }
      if (wm.includes('vertical')) {
        node.style.writingMode = 'horizontal-tb';
        node.style.textOrientation = 'mixed';
        // Preserve vertical appearance: render each character on its own line
        const text = node.textContent;
        if (text && node.children.length === 0 && text.trim().length > 0) {
          node.innerHTML = text.split('').map(ch =>
            ch === '\n' ? '<br>' : `<span style="display:block;text-align:center;line-height:1.3">${ch}</span>`
          ).join('');
          node.style.display = 'inline-block';
          node.style.verticalAlign = 'top';
        }
      }
    });
  }

  async function downloadResultImage(cardId, index, event) {
    const container = document.getElementById(cardId);
    if (!container) return;
    const btn = event?.target?.closest('.btn-ghost');
    if (btn) { btn.disabled = true; btn.textContent = '擷取中…'; }

    // Create offscreen clone at desktop width for full capture
    const wrapper = document.createElement('div');
    wrapper.style.cssText = 'position:fixed;left:-9999px;top:0;width:1200px;z-index:-1;background:#fff;';
    const clone = container.cloneNode(true);
    clone.id = '';
    // Force desktop two-column layout
    clone.style.cssText = 'display:grid;grid-template-columns:1fr 1fr;min-height:auto;';
    // Expand all panels
    clone.querySelectorAll('.result-panel').forEach(p => {
      p.style.maxHeight = 'none';
      p.style.overflow = 'visible';
      p.style.padding = '18px 20px';
      p.style.fontSize = '0.86rem';
    });
    // 清掉 fitPanelContent 留下的 inline transform/height（對齊 captureCard）
    clone.querySelectorAll('.panel-content').forEach(pc => {
      pc.style.transform = '';
      pc.style.transformOrigin = '';
      pc.style.height = '';
    });
    // 移除 UI 元素（label、潤稿按鈕、已潤稿標記）
    clone.querySelectorAll('.result-panel-label').forEach(el => el.remove());
    clone.querySelectorAll('[contenteditable]').forEach(el => el.removeAttribute('contenteditable'));
    // Fix vertical text for html2canvas
    flattenVerticalText(clone);

    wrapper.appendChild(clone);
    document.body.appendChild(wrapper);

    try {
      // Wait for layout to settle
      await new Promise(r => setTimeout(r, 100));

      const canvas = await html2canvas(clone, {
        scale: 2,
        useCORS: true,
        backgroundColor: '#ffffff',
        scrollX: 0,
        scrollY: 0,
        width: clone.scrollWidth,
        height: clone.scrollHeight
      });

      const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.download = `OCR_result_${index}.png`;
      link.href = url;
      link.click();
      URL.revokeObjectURL(url);
      showToast('圖片已下載！📥');
    } catch (err) {
      console.error('Download failed:', err);
      showToast('下載失敗 😢');
    }
    document.body.removeChild(wrapper);
    if (btn) { btn.disabled = false; btn.textContent = '📥 下載圖'; }
  }

  // ══════════════════════════════════
  // ── Polish Translation ──
  // ══════════════════════════════════
  async function polishTranslation(cardId) {
    if (isProcessing) {
      showToast('批次處理中，請稍後再潤稿 ⏳');
      return;
    }
    const btn = document.getElementById(`polish-btn-${cardId}`);
    const container = document.getElementById(cardId);
    if (!btn || !container) return;
    if (!getApiKey()) {
      showToast('先設定 API Key 啦！⚙️');
      return;
    }

    const ocrPanel = container.querySelector('[data-type="ocr"]');
    const transPanel = container.querySelector('[data-type="trans"]');
    if (!ocrPanel || !transPanel) return;

    const ocrPanelContent = ocrPanel.querySelector('.panel-content');
    const transPanelContent = transPanel.querySelector('.panel-content');
    const sourceHtml = ocrPanelContent ? ocrPanelContent.innerHTML.trim() : '';
    const translatedHtml = transPanelContent ? transPanelContent.innerHTML.trim() : '';
    if (!sourceHtml || !translatedHtml) return;

    const card = container.closest('.result-card');
    const lang = card?.dataset?.lang || lastUsedLang || 'Traditional Chinese (Taiwan usage)';

    btn.classList.add('polishing');
    btn.innerHTML = '<span class="polish-icon">✨</span> 潤稿中…';

    showRobots();
    clearAllBubbles();
    await robotPolishStart();

    try {
      const polished = await callGeminiPolish(sourceHtml, translatedHtml, lang);
      // ── Sanitize polished output ──
      const safePolished = sanitizeHtml(polished);

      const panelContent = transPanel.querySelector('.panel-content');
      if (panelContent) {
        panelContent.innerHTML = safePolished;
      } else {
        const label = transPanel.querySelector('.result-panel-label');
        const labelHtml = label ? label.outerHTML : '';
        transPanel.innerHTML = labelHtml + safePolished;
      }

      const newLabel = transPanel.querySelector('.result-panel-label');
      if (newLabel) {
        newLabel.style.justifyContent = 'space-between';
        newLabel.innerHTML = `
          <span style="display:flex;align-items:center;gap:6px;">
            <span class="dot" style="background:var(--accent)"></span>譯文
            <span class="polish-indicator visible" id="polish-ind-${cardId}">✨ 已潤稿</span>
          </span>
          <button class="btn-polish done-polish" id="polish-btn-${cardId}" onclick="polishTranslation('${cardId}')">
            <span class="polish-icon">✨</span> 再次潤稿
          </button>
        `;
      }

      await robotPolishDone();
      showToast('潤稿完成！品質再升級 💎');
    } catch (err) {
      btn.classList.remove('polishing');
      btn.innerHTML = '<span class="polish-icon">✨</span> 潤稿';
      showToast('潤稿失敗：' + err.message.substring(0, 30));
      await robotPolishError();
    }
  }

    else { localStorage.setItem(STORAGE_KEY, key); }

  function toggleKeyVisibility() {

    apiKeyInput.type = isHidden ? 'text' : 'password';

  async function testApiKey() {
    const key = apiKeyInput.value.trim();
    if (!key) { btnTest.textContent = '請先輸入 Key'; setTimeout(() => btnTest.textContent = '測試連線', 1500); return; }
    btnTest.disabled = true;
    btnTest.textContent = '測試中…';
    const ac = new AbortController();
    const timer = setTimeout(() => ac.abort(), 10000);
    try {
      const model = modelSelect.value || DEFAULT_MODEL;
      const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`;
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ contents: [{ parts: [{ text: 'Hi' }] }] }),
        signal: ac.signal
      });
      clearTimeout(timer);
      if (res.ok) {
        btnTest.textContent = '連線成功 ✓';
        btnTest.style.color = 'var(--accent)';
        btnTest.style.borderColor = 'var(--accent)';
      } else {
        const data = await res.json().catch(() => ({}));
        btnTest.textContent = data?.error?.message?.slice(0, 20) || `失敗 (${res.status})`;
        btnTest.style.color = '#c0392b';
        btnTest.style.borderColor = '#c0392b';
      }
    } catch (err) {
      clearTimeout(timer);
      btnTest.textContent = err.name === 'AbortError' ? '連線逾時' : '網路錯誤';
      btnTest.style.color = '#c0392b';
      btnTest.style.borderColor = '#c0392b';
    }
    btnTest.disabled = false;
    setTimeout(() => { btnTest.textContent = '測試連線'; btnTest.style.color = ''; btnTest.style.borderColor = ''; }, 2500);
  }

  settingsModal.addEventListener('click', e => { if (e.target === settingsModal) closeSettings(); });
  document.addEventListener('keydown', e => {

      if (viewerOverlay.classList.contains('open')) { closeViewer(); return; }
      if (settingsModal.classList.contains('open')) { closeSettings(); return; }
