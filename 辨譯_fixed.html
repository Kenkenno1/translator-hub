  // Shared save — File System Access API avoids Windows MOTW
  async function saveFile(blob, suggestedName, mimeType, extension) {
    if (window.showSaveFilePicker) {
      try {
        const handle = await showSaveFilePicker({
          suggestedName,
          types: [{ description: suggestedName, accept: { [mimeType]: [extension] } }]
        });
        const writable = await handle.createWritable();
        await writable.write(blob);
        await writable.close();
        showToast('儲存成功！✅');
        return;
      } catch (err) {
        if (err.name === 'AbortError') return;
        console.warn('File System Access failed, falling back to download:', err);
      }
    }
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = suggestedName;
    a.style.display = 'none';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    showToast('已下載到預設資料夾 📥');
  }

  // Capture a single result card as canvas (transOnly: only translation panel)
  async function captureCard(card, transOnly) {
    const panels = card.querySelector('.result-panels');
    if (!panels) return null;
    const clone = panels.cloneNode(true);
    if (transOnly) {
      const ocrPanel = clone.querySelector('[data-type="ocr"]');
      if (ocrPanel) ocrPanel.remove();
      clone.style.cssText = 'display:block;min-height:auto;width:800px;';
    } else {
      clone.style.cssText = 'display:grid;grid-template-columns:1fr 1fr;min-height:auto;width:1200px;';
    }
    clone.querySelectorAll('.result-panel').forEach(p => {
      p.style.maxHeight = 'none';
      p.style.overflow = 'visible';
      p.style.padding = '18px 20px';
      p.style.fontSize = '0.86rem';
    });
    // 清掉 fitPanelContent 留下的 inline transform/height
    clone.querySelectorAll('.panel-content').forEach(pc => {
      pc.style.transform = '';
      pc.style.transformOrigin = '';
      pc.style.height = '';
    });
    // 移除 UI 元素（label、潤稿按鈕、已潤稿標記）
    clone.querySelectorAll('.result-panel-label').forEach(el => el.remove());
    clone.querySelectorAll('[contenteditable]').forEach(el => el.removeAttribute('contenteditable'));
    flattenVerticalText(clone);
    const wrapW = transOnly ? 800 : 1200;
    const wrapper = document.createElement('div');
    wrapper.style.cssText = `position:fixed;left:-9999px;top:0;width:${wrapW}px;z-index:-1;background:#fff;`;
    wrapper.appendChild(clone);
    document.body.appendChild(wrapper);
    try {
      await new Promise(r => setTimeout(r, 100));
      const canvas = await html2canvas(clone, {
        scale: 2, useCORS: true, backgroundColor: '#ffffff',
        scrollX: 0, scrollY: 0, width: clone.scrollWidth, height: clone.scrollHeight
      });
      return canvas;
    } finally {
      if (wrapper.parentNode) document.body.removeChild(wrapper);
    }
  }

  function getResultCards() {
    return Array.from(resultsSection.querySelectorAll('.result-card'));
  }

  // --- Export: Merged Image ---
  async function exportMergedImage(transOnly) {
    const cards = getResultCards();
    if (!cards.length) return;
    showToast('合併大圖產生中…⏳');
    try {
      const canvases = [];
      for (const card of cards) {
        const c = await captureCard(card, transOnly);
        if (c) canvases.push(c);
      }
      if (!canvases.length) { showToast('截圖失敗 ❌'); return; }
      const totalW = Math.max(...canvases.map(c => c.width));
      const totalH = canvases.reduce((sum, c) => sum + c.height, 0);
      if (totalH > 16384) {
        showToast('圖片過多，合併高度超出上限，請改用 PDF 或 ZIP 匯出 ⚠️');
        return;
      }
      const merged = document.createElement('canvas');
      merged.width = totalW;
      merged.height = totalH;
      const ctx = merged.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, totalW, totalH);
      let y = 0;
      for (const c of canvases) {
        ctx.drawImage(c, 0, y);
        y += c.height;
      }
      const blob = await new Promise(r => merged.toBlob(r, 'image/png'));
      if (!blob) { showToast('圖片產生失敗 ❌'); return; }
      const fname = transOnly ? 'OCR_translated_merged.png' : 'OCR_results_merged.png';
      await saveFile(blob, fname, 'image/png', '.png');
    } catch (err) {
      console.error('Merged image export error:', err);
      showToast('合併大圖匯出失敗 ❌ ' + err.message);
    }
  }

  // --- Export: ZIP ---
  async function exportZip(transOnly) {
    const cards = getResultCards();
    if (!cards.length) return;
    showToast('ZIP 打包中…⏳');
    try {
      const zip = new JSZip();
      for (let i = 0; i < cards.length; i++) {
        const canvas = await captureCard(cards[i], transOnly);
        if (!canvas) continue;
        const blob = await new Promise(r => canvas.toBlob(r, 'image/png'));
        if (blob) zip.file(`OCR_result_${i + 1}.png`, blob);
      }
      const zipBlob = await zip.generateAsync({ type: 'blob' });
      const zipName = transOnly ? 'OCR_translated.zip' : 'OCR_results.zip';
      await saveFile(zipBlob, zipName, 'application/zip', '.zip');
    } catch (err) {
      console.error('ZIP export error:', err);
      showToast('ZIP 匯出失敗 ❌ ' + err.message);
    }
  }

  // --- Export: PDF (A4 landscape, auto-paginated) ---
  async function exportPdf(transOnly) {
    const cards = getResultCards();
    if (!cards.length) return;
    showToast('PDF 產生中…⏳');
    try {
      const jspdfModule = window.jspdf;
      const jsPDF = jspdfModule?.jsPDF;
      if (!jsPDF) { showToast('jsPDF 載入失敗 ❌'); return; }
      // A4 landscape: 297 x 210 mm
      const pageW = 297;
      const pageH = 210;
      const margin = 5; // mm
      const usableW = pageW - margin * 2;
      const usableH = pageH - margin * 2;
      // canvas 像素面積安全門檻（約 4096×4096 = 16M pixels）
      const MAX_CANVAS_AREA = 16_777_216;
      let pdf = null;
      let okCount = 0;
      let failCount = 0;
      for (let i = 0; i < cards.length; i++) {
        try {
          const canvas = await captureCard(cards[i], transOnly);
          if (!canvas) { failCount++; continue; }
          const imgW = canvas.width;
          const imgH = canvas.height;
          // 尺寸保護：若 canvas 過大，降 scale 重新截圖
          let usedCanvas = canvas;
          if (imgW * imgH > MAX_CANVAS_AREA) {
            console.warn(`Card ${i + 1}: canvas ${imgW}x${imgH} (${(imgW * imgH / 1e6).toFixed(1)}M px) exceeds safe limit, re-capturing at scale:1`);
            canvas.width = 0;
            canvas.height = 0; // 先釋放大 canvas
            const panels = cards[i].querySelector('.result-panels');
            if (!panels) { failCount++; continue; }
            const clone = panels.cloneNode(true);
            if (transOnly) {
              const ocrP = clone.querySelector('[data-type="ocr"]');
              if (ocrP) ocrP.remove();
              clone.style.cssText = 'display:block;min-height:auto;width:800px;';
            } else {
              clone.style.cssText = 'display:grid;grid-template-columns:1fr 1fr;min-height:auto;width:1200px;';
            }
            clone.querySelectorAll('.result-panel').forEach(p => {
              p.style.maxHeight = 'none';
              p.style.overflow = 'visible';
              p.style.padding = '18px 20px';
              p.style.fontSize = '0.86rem';
            });
            clone.querySelectorAll('.panel-content').forEach(pc => {
              pc.style.transform = '';
              pc.style.transformOrigin = '';
              pc.style.height = '';
            });
            clone.querySelectorAll('.result-panel-label').forEach(el => el.remove());
            clone.querySelectorAll('[contenteditable]').forEach(el => el.removeAttribute('contenteditable'));
            flattenVerticalText(clone);
            const fallbackW = transOnly ? 800 : 1200;
            const wrapper = document.createElement('div');
            wrapper.style.cssText = `position:fixed;left:-9999px;top:0;width:${fallbackW}px;z-index:-1;background:#fff;`;
            wrapper.appendChild(clone);
            document.body.appendChild(wrapper);
            try {
              await new Promise(r => setTimeout(r, 100));
              usedCanvas = await html2canvas(clone, {
                scale: 1, useCORS: true, backgroundColor: '#ffffff',
                scrollX: 0, scrollY: 0, width: clone.scrollWidth, height: clone.scrollHeight
              });
            } finally {
              if (wrapper.parentNode) document.body.removeChild(wrapper);
            }
            // 若降 scale 後仍超限，跳過
            if (usedCanvas.width * usedCanvas.height > MAX_CANVAS_AREA * 2) {
              console.warn(`Card ${i + 1}: still too large after scale:1, skipping`);
              usedCanvas.width = 0;
              usedCanvas.height = 0;
              failCount++;
              continue;
            }
          }
          const finalW = usedCanvas.width;
          const finalH = usedCanvas.height;
          const scaledW = usableW;
          const scaledH = (finalH / finalW) * usableW;
          if (scaledH <= usableH) {
            // 圖片不超過一頁：整張放入（僅此分支做 toDataURL）
            const imgData = usedCanvas.toDataURL('image/jpeg', 0.92);
            if (!pdf) { pdf = new jsPDF({ unit: 'mm', format: [pageW, pageH], orientation: 'landscape' }); }
            else { pdf.addPage([pageW, pageH], 'landscape'); }
            pdf.addImage(imgData, 'JPEG', margin, margin, scaledW, scaledH);
          } else {
            // 圖片超過一頁：裁切分頁（只對每個 slice 做 toDataURL）
            const pxPerMm = finalW / usableW;
            const sliceH = usableH * pxPerMm;
            let srcY = 0;
            while (srcY < finalH) {
              const thisSliceH = Math.min(sliceH, finalH - srcY);
              const sliceCanvas = document.createElement('canvas');
              sliceCanvas.width = finalW;
              sliceCanvas.height = thisSliceH;
              const ctx = sliceCanvas.getContext('2d');
              ctx.drawImage(usedCanvas, 0, srcY, finalW, thisSliceH, 0, 0, finalW, thisSliceH);
              const sliceData = sliceCanvas.toDataURL('image/jpeg', 0.92);
              const sliceMmH = thisSliceH / pxPerMm;
              if (!pdf) { pdf = new jsPDF({ unit: 'mm', format: [pageW, pageH], orientation: 'landscape' }); }
              else { pdf.addPage([pageW, pageH], 'landscape'); }
              pdf.addImage(sliceData, 'JPEG', margin, margin, scaledW, sliceMmH);
              srcY += thisSliceH;
              sliceCanvas.width = 0;
              sliceCanvas.height = 0;
            }
          }
          // 釋放原始 canvas 記憶體
          usedCanvas.width = 0;
          usedCanvas.height = 0;
          okCount++;
        } catch (cardErr) {
          console.warn(`PDF: card ${i + 1} failed, skipping:`, cardErr);
          failCount++;
        }
      }
      if (!pdf) { showToast('所有卡片截圖均失敗 ❌'); return; }
      const blob = pdf.output('blob');
      const pdfName = transOnly ? 'OCR_translated.pdf' : 'OCR_results.pdf';
      await saveFile(blob, pdfName, 'application/pdf', '.pdf');
      if (failCount > 0) {
        showToast(`PDF 已匯出（${okCount} 張成功，${failCount} 張跳過）⚠️`);
      }
    } catch (err) {
      console.error('PDF export error:', err);
      showToast('PDF 匯出失敗 ❌ ' + err.message);
    }
  }

  // --- Export: PPTX ---
  async function exportPptx(transOnly) {
    const cards = getResultCards();
    if (!cards.length) return;
    showToast('PPTX 產生中…⏳');
    try {
      const slideW = 10;
      // 第一輪：收集所有 canvas 資料
      const slides = [];
      for (const card of cards) {
        const canvas = await captureCard(card, transOnly);
        if (!canvas) continue;
        const imgData = canvas.toDataURL('image/png');
        const slideH = (canvas.height / canvas.width) * slideW;
        slides.push({ imgData, slideH });
      }
      if (!slides.length) { showToast('截圖失敗 ❌'); return; }
      // 用最大高度統一 layout
      const maxH = Math.max(...slides.map(s => s.slideH), 5.63);
      const pptx = new PptxGenJS();
      pptx.defineLayout({ name: 'CUSTOM', width: slideW, height: maxH });
      pptx.layout = 'CUSTOM';
      // 第二輪：建立投影片
      for (const s of slides) {
        const slide = pptx.addSlide();
        slide.addImage({ data: s.imgData, x: 0, y: 0, w: slideW, h: s.slideH });
      }
      const blob = await pptx.write({ outputType: 'blob' });
      const pptxName = transOnly ? 'OCR_translated.pptx' : 'OCR_results.pptx';
      await saveFile(blob, pptxName, 'application/vnd.openxmlformats-officedocument.presentationml.presentation', '.pptx');
    } catch (err) {
      console.error('PPTX export error:', err);
      showToast('PPTX 匯出失敗 ❌ ' + err.message);
    }
  }

  // --- Export: DOCX ---
  async function exportDocx(transOnly) {
    const cards = getResultCards();
    if (!cards.length) return;
    showToast('DOCX 產生中…⏳');
    try {
      const { Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell, WidthType, PageBreak } = docx;
      const children = [];
      for (let i = 0; i < cards.length; i++) {
        const card = cards[i];
        const transPanel = card.querySelector('[data-type="trans"] .panel-content');
        const transText = transPanel ? transPanel.innerText : '';
        const transParas = transText.split('\n').filter(l => l.trim()).map(l => new Paragraph({ children: [new TextRun(l)] }));
        if (transOnly) {
          children.push(
            new Paragraph({ children: [new TextRun({ text: `圖片 #${i + 1}`, bold: true, size: 28 })] }),
            ...(transParas.length ? transParas : [new Paragraph('')])
          );
        } else {
          const ocrPanel = card.querySelector('[data-type="ocr"] .panel-content');
          const ocrText = ocrPanel ? ocrPanel.innerText : '';
          const ocrParas = ocrText.split('\n').filter(l => l.trim()).map(l => new Paragraph({ children: [new TextRun(l)] }));
          const headerRow = new TableRow({
            children: [
              new TableCell({ children: [new Paragraph({ children: [new TextRun({ text: '原文 OCR', bold: true })] })], width: { size: 50, type: WidthType.PERCENTAGE } }),
              new TableCell({ children: [new Paragraph({ children: [new TextRun({ text: '譯文', bold: true })] })], width: { size: 50, type: WidthType.PERCENTAGE } }),
            ]
          });
          const contentRow = new TableRow({
            children: [
              new TableCell({ children: ocrParas.length ? ocrParas : [new Paragraph('')], width: { size: 50, type: WidthType.PERCENTAGE } }),
              new TableCell({ children: transParas.length ? transParas : [new Paragraph('')], width: { size: 50, type: WidthType.PERCENTAGE } }),
            ]
          });
          children.push(
            new Paragraph({ children: [new TextRun({ text: `圖片 #${i + 1}`, bold: true, size: 28 })] }),
            new Table({ rows: [headerRow, contentRow], width: { size: 100, type: WidthType.PERCENTAGE } })
          );
        }
        if (i < cards.length - 1) {
          children.push(new Paragraph({ children: [new PageBreak()] }));
        }
      }
      const doc = new Document({ sections: [{ children }] });
      const blob = await Packer.toBlob(doc);
      const docxName = transOnly ? 'OCR_translated.docx' : 'OCR_results.docx';
      await saveFile(blob, docxName, 'application/vnd.openxmlformats-officedocument.wordprocessingml.document', '.docx');
    } catch (err) {
      console.error('DOCX export error:', err);
      showToast('DOCX 匯出失敗 ❌ ' + err.message);
    }
  }

  // --- Export: XLSX ---
  async function exportXlsx(transOnly) {
    const cards = getResultCards();
    if (!cards.length) return;
    showToast('XLSX 產生中…⏳');
    try {
      const header = transOnly ? ['圖片編號', '譯文'] : ['圖片編號', '原文', '譯文'];
      const data = [header];
      cards.forEach((card, i) => {
        const transPanel = card.querySelector('[data-type="trans"] .panel-content');
        const transText = transPanel ? transPanel.innerText : '';
        if (transOnly) {
          data.push([`#${i + 1}`, transText]);
        } else {
          const ocrPanel = card.querySelector('[data-type="ocr"] .panel-content');
          data.push([`#${i + 1}`, ocrPanel ? ocrPanel.innerText : '', transText]);
        }
      });
      const wb = XLSX.utils.book_new();
      const ws = XLSX.utils.aoa_to_sheet(data);
      ws['!cols'] = transOnly ? [{ wch: 10 }, { wch: 80 }] : [{ wch: 10 }, { wch: 60 }, { wch: 60 }];
      XLSX.utils.book_append_sheet(wb, ws, transOnly ? 'Translated' : 'OCR Results');
      const wbout = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
      const blob = new Blob([wbout], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
      const xlsxName = transOnly ? 'OCR_translated.xlsx' : 'OCR_results.xlsx';
      await saveFile(blob, xlsxName, 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet', '.xlsx');
    } catch (err) {
      console.error('XLSX export error:', err);
      showToast('XLSX 匯出失敗 ❌ ' + err.message);
    }
  }

  // ══════════════════════════════════
  // ── File / Paste / Drop Events ──
  // ══════════════════════════════════
  function handleFiles(files) {
    if (isProcessing) {
      showToast('批次處理中，請稍後再加入圖片 ⏳');
      return;
    }
    for (const file of files) {
      if (file.type.startsWith('image/')) {
        addToQueue(file);
      }
    }
  }

  dropZone.addEventListener('click', () => fileInput.click());
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    handleFiles(e.dataTransfer.files);
  });
  fileInput.addEventListener('change', e => {
    handleFiles(e.target.files);
    fileInput.value = '';
  });
  document.addEventListener('paste', e => {
    if (isProcessing) return;
    // Don't intercept paste when editing result panels
    if (e.target.closest('[contenteditable]')) return;
    const items = (e.clipboardData || e.originalEvent.clipboardData).items;
    let intercepted = false;
    for (const item of items) {
      if (item.kind === 'file' && item.type.startsWith('image/')) {
        addToQueue(item.getAsFile());
        intercepted = true;
      }
    }
    if (intercepted) e.preventDefault();
  });

  // ── Keyboard shortcut: Ctrl+Enter to translate with last-used language ──
  document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter' && !isProcessing && imageQueue.length > 0) {
      e.preventDefault();
      const lang = lastUsedLang || 'Traditional Chinese (Taiwan usage)';
      startBatch(lang);
    }
  });

  // Initial state
  updateQueueUI();
</script>
