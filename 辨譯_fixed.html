<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OCR 翻譯 — 批次模式</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Noto+Serif+TC:wght@300;400;600&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" integrity="sha384-ZZ1pncU3bQe8y31yfZdMFdSpttDoPmOZg2wguVK9almUodir1PghgT0eY7Mrty8H" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js" integrity="sha384-+mbV2IY1Zk/X1p/nWllGySJSUN8uMs+gUAN10Or95UBH0fpj6GfKgPmgC5EXieXG" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@4.2.1/dist/jspdf.umd.min.js" integrity="sha384-qovJwSBbRDPP5cEjCp8S0UP66wrvnjaa60XMOGzTNanrThcrGfXfnZkvgY8N1KT3" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js" integrity="sha384-Cck14aA9cifjYolcnjebXRfWGkz5ltHMBiG4px/j8GS+xQcb7OhNQWZYyWjQ+UwQ" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.umd.min.js" integrity="sha384-TcLTgu6flPhnZ5dfHnHimsxNFjYWN0povfGgnOvgPJKbZe6IbuoC2ociiatSHl9E" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js" integrity="sha384-vtjasyidUo0kW94K5MXDXntzOJpQgBKXmE7e2Ga4LG0skTTLeBi97eFAXsqewJjw" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #1a1a1a;
    --ink2: #555;
    --ink3: #999;
    --line: #e8e8e8;
    --bg: #fafaf8;
    --white: #ffffff;
    --accent: #2a6049;
    --accent-l: #e8f2ee;
    --zh-grad1: #237354;
    --zh-grad2: #3aab7a;
    --en-grad1: #1e4fa3;
    --en-grad2: #3d7fe8;
    --ja-grad1: #c0321f;
    --ja-grad2: #f05c42;
  }
  body {
    font-family: 'DM Sans', 'Zen Kaku Gothic New', 'Microsoft JhengHei', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
  }
  /* ── Header ── */
  header {
    width: 100%;
    padding: 20px 40px;
    border-bottom: 1px solid var(--line);
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--white);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-left { display: flex; align-items: center; gap: 16px; }
  header h1 {
    font-family: 'Noto Serif TC', serif;
    font-weight: 300;
    font-size: 1.3rem;
    letter-spacing: 0.06em;
    color: var(--ink);
  }
  .badge {
    background: linear-gradient(135deg, var(--zh-grad1), var(--zh-grad2));
    color: #fff;
    font-size: 0.62rem;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .batch-count {
    font-size: 0.78rem;
    color: var(--ink3);
    font-weight: 500;
    min-width: 100px;
    text-align: right;
  }
  .batch-count strong {
    color: var(--accent);
    font-size: 1.1rem;
    font-weight: 700;
  }
  .btn-settings {
    background: none;
    border: 1px solid var(--line);
    width: 34px; height: 34px;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.05rem;
    color: var(--ink3);
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .btn-settings:hover { border-color: var(--ink2); color: var(--ink); background: var(--bg); }
  /* ── Layout ── */
  .app-layout {
    display: flex;
    min-height: calc(100vh - 65px);
  }
  /* ── Main content ── */
  .main-content {
    flex: 1;
    padding: 28px 36px 120px;
    max-width: calc(100% - 110px);
  }
  /* ── Upload zone ── */
  .upload-zone {
    border: 1.5px dashed var(--line);
    border-radius: 14px;
    padding: 36px 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.25s, background 0.25s, transform 0.2s;
    background: var(--white);
    position: relative;
    overflow: hidden;
  }
  .upload-zone:hover,
  .upload-zone.drag-over {
    border-color: var(--accent);
    background: var(--accent-l);
    transform: scale(1.005);
  }
  .upload-zone.drag-over { border-width: 2.5px; }
  .upload-icon { font-size: 28px; margin-bottom: 8px; opacity: 0.5; }
  .upload-text { font-size: 0.86rem; color: var(--ink2); line-height: 1.7; }
  .upload-text strong { color: var(--ink); font-weight: 500; }
  .upload-hint { margin-top: 6px; font-size: 0.72rem; color: var(--ink3); }
  /* ── Batch Queue ── */
  .queue-section {
    margin-top: 24px;
  }
  .queue-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }
  .queue-title {
    font-size: 0.78rem;
    font-weight: 500;
    color: var(--ink2);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .queue-pill {
    background: var(--accent);
    color: #fff;
    font-size: 0.65rem;
    font-weight: 700;
    padding: 2px 9px;
    border-radius: 12px;
    min-width: 22px;
    text-align: center;
  }
  .btn-clear-queue {
    background: none;
    border: 1px solid var(--line);
    color: var(--ink3);
    font-family: inherit;
    font-size: 0.72rem;
    padding: 4px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-clear-queue:hover { border-color: #c0392b; color: #c0392b; }
  .queue-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
  }
  .queue-item {
    position: relative;
    width: 260px;
    height: 200px;
    border-radius: 10px;
    overflow: hidden;
    border: 1.5px solid var(--line);
    background: var(--white);
    cursor: default;
    transition: all 0.25s;
    animation: queuePop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes queuePop {
    0% { transform: scale(0.5) rotate(-5deg); opacity: 0; }
    100% { transform: scale(1) rotate(0); opacity: 1; }
  }
  .queue-item:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.08); }
  .queue-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .queue-item .remove-btn {
    position: absolute;
    top: 4px;
    right: 4px;
    width: 22px; height: 22px;
    background: rgba(0,0,0,0.6);
    color: #fff;
    border: none;
    border-radius: 50%;
    font-size: 0.7rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.15s;
    backdrop-filter: blur(4px);
  }
  .queue-item:hover .remove-btn { opacity: 1; }
  .queue-item .item-number {
    position: absolute;
    bottom: 4px;
    left: 4px;
    background: rgba(0,0,0,0.55);
    color: #fff;
    font-size: 0.6rem;
    font-weight: 700;
    padding: 1px 7px;
    border-radius: 8px;
    backdrop-filter: blur(4px);
  }
  .queue-item.processing {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--accent-l);
  }
  .queue-item.processing::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(42,96,73,0.15);
    animation: processingPulse 1s ease-in-out infinite;
  }
  @keyframes processingPulse {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 0.7; }
  }
  .queue-item.done { border-color: var(--accent); }
  .queue-item.done::after {
    content: '✓';
    position: absolute;
    inset: 0;
    background: rgba(42,96,73,0.5);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
    font-weight: 700;
  }
  .queue-empty {
    text-align: center;
    padding: 30px;
    color: var(--ink3);
    font-size: 0.82rem;
    border: 1.5px dashed var(--line);
    border-radius: 10px;
    background: var(--white);
  }
  /* ── Status ── */
  #status-text {
    text-align: center;
    font-size: 0.82rem;
    color: var(--ink3);
    min-height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    margin: 16px 0;
  }
  .spinner {
    width: 13px; height: 13px;
    border: 1.5px solid var(--line);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  /* ── Results area ── */
  .results-section { margin-top: 24px; }
  /* ── Export Toolbar ── */
  .export-toolbar {
    display: none;
    margin-top: 20px;
    padding: 16px 20px;
    background: var(--white);
    border: 1px solid var(--line);
    border-radius: 12px;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }
  .export-toolbar.visible { display: flex; }
  .export-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--ink3);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    white-space: nowrap;
  }
  .export-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn-export {
    background: var(--bg);
    border: 1px solid var(--line);
    color: var(--ink2);
    font-family: inherit;
    font-size: 0.76rem;
    font-weight: 500;
    padding: 7px 14px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    white-space: nowrap;
  }
  .btn-export:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-l); }
  .btn-export:disabled { opacity: 0.4; cursor: not-allowed; }
  .result-card {
    background: var(--white);
    border: 1px solid var(--line);
    border-radius: 14px;
    margin-bottom: 20px;
    overflow: hidden;
    animation: resultSlideIn 0.5s cubic-bezier(0.22, 1, 0.36, 1);
  }
  @keyframes resultSlideIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .result-header {
    padding: 12px 18px;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--bg);
  }
  .result-thumb {
    width: 48px; height: 36px;
    object-fit: cover;
    border-radius: 6px;
    border: 1px solid var(--line);
  }
  .result-meta {
    flex: 1;
    font-size: 0.78rem;
    color: var(--ink2);
    font-weight: 500;
  }
  .result-panels {
    display: grid;
    grid-template-columns: 1fr 1fr;
    min-height: 200px;
  }
  @media (max-width: 860px) {
    .result-panels { grid-template-columns: 1fr; }
  }
  .result-panel {
    padding: 18px 20px;
    overflow-y: auto;
    max-height: 60vh;
    font-size: 0.86rem;
    line-height: 1.75;
    font-family: 'Noto Serif TC', serif;
    color: var(--ink);
  }
  .result-panel + .result-panel { border-left: 1px solid var(--line); }
  @media (max-width: 860px) {
    .result-card { overflow: visible; }
    .result-panel + .result-panel { border-left: none; border-top: 1px solid var(--line); }
    .result-panel {
      max-height: none;
      overflow-y: visible;
      padding: 14px 12px;
      font-size: 0.82rem;
    }
    .panel-content {
      transform-origin: top left;
    }
    .result-panel table {
      table-layout: fixed;
      word-break: break-word;
    }
    .result-panel img {
      max-width: 100%;
      height: auto;
    }
    .result-panel pre {
      white-space: pre-wrap;
      word-break: break-word;
      overflow-x: hidden;
    }
  }
  .panel-content {
    outline: none;
    min-height: 2em;
    cursor: text;
  }
  .panel-content:focus {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
    border-radius: 4px;
  }
  .result-panel-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.68rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--ink3);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .result-panel-label .dot { width: 5px; height: 5px; border-radius: 50%; }
  .result-panel table { width: 100%; border-collapse: collapse; margin: 8px 0; }
  .result-panel td, .result-panel th { border: 1px solid var(--line); padding: 5px 8px; }
  .result-panel::-webkit-scrollbar { width: 4px; }
  .result-panel::-webkit-scrollbar-track { background: transparent; }
  .result-panel::-webkit-scrollbar-thumb { background: var(--line); border-radius: 2px; }
  /* ── Fullscreen Viewer ── */
  .viewer-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 9999;
    background: #ffffff;
    flex-direction: column;
  }
  .viewer-overlay.open { display: flex; }
  .viewer-toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 16px;
    background: #f5f5f5;
    border-bottom: 1px solid var(--line);
    flex-shrink: 0;
  }
  .viewer-toolbar button {
    background: none;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 0.85rem;
    font-family: inherit;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    color: var(--ink);
  }
  .viewer-toolbar button:active { background: var(--line); }
  .viewer-body {
    flex: 1;
    overflow: auto;
    -webkit-overflow-scrolling: touch;
    padding: 16px;
    font-family: 'Noto Serif TC', serif;
    font-size: 0.92rem;
    line-height: 1.8;
    color: var(--ink);
  }
  .viewer-body table { width: 100%; border-collapse: collapse; margin: 8px 0; }
  .viewer-body td, .viewer-body th { border: 1px solid var(--line); padding: 5px 8px; }
  .viewer-body img { max-width: 100%; height: auto; }
  .viewer-body pre { white-space: pre-wrap; word-break: break-word; }
  /* ── Sync scroll indicator ── */
  .sync-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 0.62rem;
    font-weight: 600;
    color: var(--ink3);
    background: var(--bg);
    border: 1px solid var(--line);
    padding: 2px 8px;
    border-radius: 10px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    user-select: none;
    cursor: pointer;
    transition: all 0.2s;
  }
  .sync-badge:hover { border-color: var(--ink2); color: var(--ink2); }
  .sync-badge .sync-icon {
    display: inline-block;
    transition: transform 0.3s;
  }
  .sync-badge.active { color: var(--accent); border-color: var(--accent); background: var(--accent-l); }
  .sync-badge.active .sync-icon { transform: rotate(0deg); }
  .sync-badge:not(.active) .sync-icon { transform: rotate(45deg); opacity: 0.5; }
  /* Scroll highlight pulse on synced panel */
  .result-panel.sync-flash {
    box-shadow: inset 0 0 0 1.5px var(--accent);
    transition: box-shadow 0.15s;
  }
  .result-actions {
    padding: 10px 18px;
    border-top: 1px solid var(--line);
    display: flex;
    gap: 6px;
    justify-content: flex-end;
    background: var(--bg);
  }
  /* ── Polish Button ── */
  .btn-polish {
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: linear-gradient(135deg, #f8f0e3 0%, #f2e6d0 100%);
    border: 1px solid #e0d1b8;
    color: #8a6d3b;
    font-family: 'Zen Kaku Gothic New', 'DM Sans', sans-serif;
    font-size: 0.72rem;
    font-weight: 600;
    padding: 5px 14px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.25s;
    overflow: hidden;
    letter-spacing: 0.02em;
  }
  .btn-polish:hover {
    background: linear-gradient(135deg, #f5ead8 0%, #eddbbc 100%);
    border-color: #c9b48e;
    box-shadow: 0 3px 12px rgba(138,109,59,0.15);
    transform: translateY(-1px);
  }
  .btn-polish:active { transform: scale(0.96); }
  .btn-polish .polish-icon { font-size: 0.85rem; }
  .btn-polish::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(108deg, transparent 30%, rgba(255,255,255,0.4) 50%, transparent 70%);
    background-size: 250% 100%;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  .btn-polish:hover::after { opacity: 1; animation: shimmer 2s linear infinite; }
  .btn-polish.polishing {
    pointer-events: none;
    background: linear-gradient(135deg, #fdf6e3 0%, #f5ecd3 100%);
    color: #b8943e;
    border-color: #d4c08a;
  }
  .btn-polish.polishing .polish-icon {
    animation: polishSpin 1s ease-in-out infinite;
  }
  @keyframes polishSpin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
  .btn-polish.done-polish {
    background: linear-gradient(135deg, #e8f2ee 0%, #d5ebdf 100%);
    border-color: #b8dcc8;
    color: var(--accent);
  }
  /* ── Polish diff indicator ── */
  .polish-indicator {
    display: none;
    align-items: center;
    gap: 4px;
    font-size: 0.6rem;
    font-weight: 600;
    color: #b8943e;
    letter-spacing: 0.04em;
    padding: 2px 8px;
    background: #fdf6e3;
    border: 1px solid #e8dbb8;
    border-radius: 10px;
  }
  .polish-indicator.visible { display: inline-flex; }
  /* ── Fixed Right Sidebar Buttons ── */
  .side-actions {
    position: fixed;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    z-index: 200;
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .action-btn {
    position: relative;
    width: 96px;
    padding: 22px 8px 18px;
    border: none;
    cursor: pointer;
    font-family: 'Zen Kaku Gothic New', 'DM Sans', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    overflow: hidden;
    transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    color: #fff;
  }
  .action-btn:first-child { border-radius: 18px 0 0 0; }
  .action-btn:last-child { border-radius: 0 0 0 18px; }
  .action-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(108deg, transparent 30%, rgba(255,255,255,0.2) 50%, transparent 70%);
    background-size: 250% 100%;
    animation: shimmer 3s linear infinite;
    pointer-events: none;
  }
  @keyframes shimmer {
    0%   { background-position: -250% center; }
    100% { background-position: 250% center; }
  }
  .action-btn.zh { background: linear-gradient(180deg, var(--zh-grad1), var(--zh-grad2)); }
  .action-btn.en { background: linear-gradient(180deg, var(--en-grad1), var(--en-grad2)); }
  .action-btn.ja { background: linear-gradient(180deg, var(--ja-grad1), var(--ja-grad2)); }
  .action-btn:hover {
    width: 110px;
    box-shadow: -8px 0 32px rgba(0,0,0,0.25);
  }
  .action-btn:active { transform: scale(0.92); }
  .action-flag { font-size: 1.8rem; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)); transition: transform 0.3s; }
  .action-btn:hover .action-flag { transform: scale(1.15) rotate(-5deg); }
  .action-label { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.04em; white-space: nowrap; }
  .action-sub { font-size: 0.55rem; opacity: 0.7; letter-spacing: 0.02em; }
  .action-btn.disabled {
    opacity: 0.4;
    pointer-events: none;
    filter: grayscale(0.5);
  }
  .action-btn.processing-btn {
    pointer-events: none;
  }
  .action-btn.processing-btn .action-flag {
    animation: flagSpin 0.6s ease-in-out infinite;
  }
  @keyframes flagSpin {
    0%, 100% { transform: rotate(0deg); }
    25% { transform: rotate(15deg); }
    75% { transform: rotate(-15deg); }
  }
  /* ── Toast / Reaction ── */
  .toast-container {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 9999;
    pointer-events: none;
  }
  .toast {
    background: rgba(10, 10, 10, 0.88);
    color: #fff;
    font-family: 'Zen Kaku Gothic New', 'Noto Serif TC', sans-serif;
    font-size: 1.6rem;
    font-weight: 700;
    padding: 20px 40px;
    border-radius: 20px;
    backdrop-filter: blur(12px);
    white-space: nowrap;
    text-align: center;
    animation: toastBoom 1.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    letter-spacing: 0.04em;
  }
  @keyframes toastBoom {
    0%   { opacity: 0; transform: scale(0.3) rotate(-8deg); }
    15%  { opacity: 1; transform: scale(1.15) rotate(2deg); }
    25%  { transform: scale(0.95) rotate(-1deg); }
    35%  { transform: scale(1.02) rotate(0); }
    70%  { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(0.8) translateY(-30px); }
  }
  /* ── Confetti ── */
  .confetti-piece {
    position: fixed;
    z-index: 9998;
    pointer-events: none;
    width: 10px;
    height: 10px;
    border-radius: 2px;
    animation: confettiFall 2s ease-out forwards;

  @keyframes confettiFall {
    0%   { opacity: 1; transform: translate(0, 0) rotate(0deg) scale(1); }
    100% { opacity: 0; transform: translate(var(--dx), var(--dy)) rotate(720deg) scale(0.3); }
  }
  /* ── Screen Shake ── */
  @keyframes screenShake {
    0%, 100% { transform: translate(0); }
    10% { transform: translate(-6px, 3px); }
    20% { transform: translate(5px, -4px); }
    30% { transform: translate(-3px, 6px); }
    40% { transform: translate(4px, -2px); }
    50% { transform: translate(-5px, 2px); }
    60% { transform: translate(3px, -5px); }
    70% { transform: translate(-2px, 4px); }
    80% { transform: translate(6px, -3px); }
    90% { transform: translate(-4px, 5px); }

  body.shaking { animation: screenShake 0.5s ease-in-out; }
  /* ── Emoji Rain ── */
  .emoji-rain {
    position: fixed;
    z-index: 9997;
    pointer-events: none;
    font-size: 2rem;

  /* ── btn-ghost ── */

  /* ── Progress Bar ── */
  .progress-bar-container {
    position: fixed;
    bottom: 0;

    right: 110px;

  /* ── Cancel Batch Button ── */

  /* ── Settings Modal ── */
  #settings-modal {

  .field-row-model {

  .field-input-select {

  .key-hint {

  @media (max-width: 700px) {

  /* ══════════════════════════════════
     ── Robot Mascots Stage (Simplified SVG) ──

  .robot-stage {
    position: fixed;
    bottom: 18px;
    left: 18px;
    z-index: 500;
    pointer-events: none;
    opacity: 0;
    transform: translateY(40px);
    transition: opacity 0.45s cubic-bezier(0.22, 1, 0.36, 1), transform 0.45s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .robot-stage.visible {
    opacity: 1;

  .robot {

    transition: all 0.3s ease;

  .robot.idle::after { animation: robotShadowFloat 3.2s ease-in-out infinite; }
  @keyframes robotShadowFloat {

    50% { transform: scale(0.84); opacity: 0.06; }
  }
  .robot-svg {
    width: 84px;
    height: 84px;
    overflow: visible;
    filter: drop-shadow(0 7px 16px rgba(17, 24, 22, 0.1));
    transition: transform 0.22s ease, filter 0.22s ease;
  }
  .robot-shell {
    fill: #ffffff;
    stroke: currentColor;
    stroke-width: 2.2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .robot-face {
    fill: rgba(255,255,255,0.94);
    stroke: currentColor;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;

  .robot-antenna,
  .robot-wave,
  .robot-mouth {
    fill: none;
    stroke: currentColor;
    stroke-width: 2.3;
    stroke-linecap: round;
    stroke-linejoin: round;

  .robot-accent {
    fill: none;
    stroke: currentColor;
    stroke-width: 2.2;

    stroke-linejoin: round;
  }
  .robot-eye {
    --eye-x: 0px;
    --eye-y: 0px;
    --eye-blink: 1;
    transform-box: fill-box;
    transform-origin: center;
    transition: transform 0.18s ease;
    transform: translate(var(--eye-x), var(--eye-y)) scaleY(var(--eye-blink));
    fill: #1a2621;
  }
  .robot-eye.blinking { --eye-blink: 0.16; }
  .robot.scanner { color: #2f88ca; }
  .robot.translator { color: #4d755f; }
  .robot.scanner .robot-shell { fill: #f7fcff; }
  .robot.translator .robot-shell { fill: #f6faf7; }
  .robot.scanner .robot-face { fill: rgba(79, 172, 254, 0.08); }

  .robot.scanner .robot-accent { fill: #67d9ff; stroke: none; }
  .robot .robot-mouth { stroke: #1a2621; }
  .robot .robot-mouth-talk {

    stroke-width: 2;
  }
  .robot .robot-mouth-surprised { fill: rgba(255,255,255,0.76); }
  .robot.scanner.active .robot-svg,

  }
  .robot.idle .robot-svg { animation: robotFloat 3.4s ease-in-out infinite; }
  @keyframes robotFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-4px); }
  }
  .robot.talking .robot-svg { animation: robotTalkBob 0.28s ease-in-out infinite alternate; }
  @keyframes robotTalkBob {
    from { transform: translateY(0) scale(1); }
    to { transform: translateY(-1.5px) scale(1.02, 0.99); }
  }
  .robot.scanner.waving .robot-wave { animation: robotWaveRight 0.5s ease-in-out 3; }
  .robot.translator.waving .robot-wave { animation: robotWaveLeft 0.5s ease-in-out 3; }
  .robot.excited .robot-svg { animation: robotExcited 0.38s ease-in-out infinite alternate; }
  @keyframes robotWaveRight {
    0%, 100% { transform: rotate(0deg); transform-origin: 78px 54px; }
    50% { transform: rotate(-14deg); transform-origin: 78px 54px; }
  }
  @keyframes robotWaveLeft {
    0%, 100% { transform: rotate(0deg); transform-origin: 18px 54px; }
    50% { transform: rotate(14deg); transform-origin: 18px 54px; }
  }
  @keyframes robotExcited {
    from { transform: translateY(-1px) rotate(-1deg); }
    to { transform: translateY(-3px) rotate(1deg); }
  }
  .robot .robot-mouth-talk,
  .robot .robot-mouth-happy,
  .robot .robot-mouth-surprised {
    display: none;
  }
  .robot.happy .robot-mouth-neutral,
  .robot.surprised .robot-mouth-neutral,
  .robot.talking .robot-mouth-neutral {
    display: none;
  }
  .robot.happy .robot-mouth-happy { display: block; }
  .robot.surprised .robot-mouth-surprised { display: block; }

<div class="app-layout">
  <div class="main-content">

    <div id="status-text"></div>
    <!-- Results -->
    <div class="results-section" id="results-section"></div>
    <!-- Export Toolbar -->

      <div class="export-buttons">

        <button class="btn-export" onclick="exportDocx()" title="匯出 Word 文件">📝 DOCX</button>

        <button class="btn-export" onclick="exportZip(true)" title="僅譯文截圖 ZIP">📦 譯文ZIP</button>

        <button class="btn-export" onclick="exportPptx(true)" title="僅譯文投影片">📊 譯文PPTX</button>
        <button class="btn-export" onclick="exportDocx(true)" title="僅譯文 Word">📝 譯文DOCX</button>
        <button class="btn-export" onclick="exportXlsx(true)" title="僅譯文 Excel">📋 譯文XLSX</button>
      </div>
    </div>
  </div>
