<!doctype html>
<html lang="zh-Hant" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="翻譯工具" />
  <title>翻譯工具集</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    [data-theme="dark"]{
      --bg:#0a0c10;
      --card:rgba(255,255,255,0.05);
      --card-hover:rgba(255,255,255,0.09);
      --text:rgba(255,255,255,0.92);
      --muted:rgba(255,255,255,0.5);
      --accent:#6ee7b7;
      --border:rgba(255,255,255,0.08);
    }
    [data-theme="light"]{
      --bg:#f4f5f7;
      --card:rgba(0,0,0,0.03);
      --card-hover:rgba(0,0,0,0.07);
      --text:rgba(0,0,0,0.88);
      --muted:rgba(0,0,0,0.45);
      --accent:#059669;
      --border:rgba(0,0,0,0.08);
    }

    *{margin:0;padding:0;box-sizing:border-box}
    body{
      background:var(--bg);
      color:var(--text);
      font-family:Inter,"Noto Sans TC",system-ui,-apple-system,sans-serif;
      -webkit-font-smoothing:antialiased;
      min-height:100dvh;
      display:flex;
      flex-direction:column;
      align-items:center;
      padding:env(safe-area-inset-top) 16px 32px;
    }

    /* Header */
    .header{
      text-align:center;
      margin:48px 0 36px;
    }
    .header h1{
      font-size:28px;
      font-weight:700;
      letter-spacing:-0.02em;
      margin-bottom:8px;
    }
    .header p{
      font-size:14px;
      color:var(--muted);
    }

    /* Theme toggle */
    .theme-btn{
      position:fixed;
      top:max(12px, env(safe-area-inset-top));
      right:16px;
      background:none;
      border:none;
      color:var(--muted);
      font-size:22px;
      cursor:pointer;
      z-index:10;
      padding:8px;
      border-radius:8px;
      transition:background 0.2s;
    }
    .theme-btn:hover{background:var(--card-hover)}

    /* Grid */
    .grid{
      display:grid;
      grid-template-columns:1fr;
      gap:14px;
      width:100%;
      max-width:480px;
    }

    /* App card */
    .app-card{
      display:flex;
      align-items:center;
      gap:16px;
      padding:18px 20px;
      background:var(--card);
      border:1px solid var(--border);
      border-radius:16px;
      text-decoration:none;
      color:var(--text);
      transition:background 0.2s, border-color 0.2s, transform 0.15s;
      cursor:pointer;
    }
    .app-card:hover{
      background:var(--card-hover);
      border-color:var(--accent);
      transform:translateY(-2px);
    }
    .app-card:active{
      transform:scale(0.98);
    }

    .app-icon{
      width:56px;
      height:56px;
      border-radius:14px;
      object-fit:cover;
      flex-shrink:0;
      background:var(--card);
    }

    .app-info{
      flex:1;
      min-width:0;
    }
    .app-name{
      font-size:17px;
      font-weight:600;
      margin-bottom:3px;
    }
    .app-desc{
      font-size:13px;
      color:var(--muted);
    }
    .app-arrow{
      font-size:18px;
      color:var(--muted);
      flex-shrink:0;
    }

    /* Footer */
    .footer{
      margin-top:auto;
      padding-top:48px;
      text-align:center;
      font-size:12px;
      color:var(--muted);
      opacity:0.6;
    }

    @media(min-width:600px){
      .grid{
        grid-template-columns:repeat(2, 1fr);
        max-width:640px;
      }
    }
  </style>
</head>
<body>
  <button class="theme-btn" id="themeBtn" title="切換主題">◑</button>

  <div class="header">
    <h1>翻譯工具集</h1>
    <p>選擇語言方向，開始翻譯</p>
  </div>

  <div class="grid" id="appGrid">
    <!-- Apps are rendered by JS from the config below -->
  </div>

  <div class="footer">Powered by OpenAI</div>

  <script>
    // ============================================================
    // APP 清單 — 新增 APP 只要在這裡加一筆即可
    // ============================================================
    const APPS = [
      {
        name: '中日翻譯',
        desc: '中文 ↔ 日本語',
        url: 'https://kenkenno1.github.io/japan-translator/',
        icon: 'https://kenkenno1.github.io/japan-translator/icon-180.png?v=2',
        flag: '🇯🇵',
      },
      {
        name: '中英翻譯',
        desc: '中文 ↔ English',
        url: 'https://kenkenno1.github.io/TW-ENG-translator/',
        icon: 'https://kenkenno1.github.io/TW-ENG-translator/icon-180.png?v=2',
        flag: '🇺🇸',
      },
      {
        name: '中韓翻譯',
        desc: '中文 ↔ 한국어',
        url: 'https://kenkenno1.github.io/TW-KOR-translator/',
        icon: 'https://kenkenno1.github.io/TW-KOR-translator/icon-180.png?v=2',
        flag: '🇰🇷',
      },
      {
        name: '中泰翻譯',
        desc: '中文 ↔ ภาษาไทย',
        url: 'https://kenkenno1.github.io/TW-THA-translator/',
        icon: 'https://kenkenno1.github.io/TW-THA-translator/icon-180.png?v=1',
        flag: '🇹🇭',
      },
      {
        name: '中越翻譯',
        desc: '中文 ↔ Tiếng Việt',
        url: 'https://kenkenno1.github.io/TW-VIE-translator/',
        icon: 'https://kenkenno1.github.io/TW-VIE-translator/icon-180.png?v=1',
        flag: '🇻🇳',
      },
      // 新增 APP 範例：
      // {
      //   name: '中法翻譯',
      //   desc: '中文 ↔ Français',
      //   url: 'https://kenkenno1.github.io/TW-FRA-translator/',
      //   icon: 'https://kenkenno1.github.io/TW-FRA-translator/icon-180.png',
      //   flag: '🇫🇷',
      // },
    ];

    // Render cards
    const grid = document.getElementById('appGrid');
    APPS.forEach(app => {
      const a = document.createElement('a');
      a.className = 'app-card';
      a.href = app.url;
      a.target = '_blank';
      a.rel = 'noopener';
      a.innerHTML = `
        <img class="app-icon" src="${app.icon}" alt="${app.name}" loading="lazy" />
        <div class="app-info">
          <div class="app-name">${app.flag} ${app.name}</div>
          <div class="app-desc">${app.desc}</div>
        </div>
        <span class="app-arrow">›</span>
      `;
      grid.appendChild(a);
    });

    // Theme toggle
    const themeBtn = document.getElementById('themeBtn');
    let theme = localStorage.getItem('hub_theme') || 'dark';
    applyTheme(theme);

    themeBtn.addEventListener('click', () => {
      theme = theme === 'dark' ? 'light' : 'dark';
      applyTheme(theme);
    });

    function applyTheme(t) {
      theme = t;
      document.documentElement.setAttribute('data-theme', t);
      localStorage.setItem('hub_theme', t);
      themeBtn.textContent = t === 'dark' ? '◑' : '◐';
    }
  </script>
</body>
</html>
