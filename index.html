<!doctype html>
<html lang="zh-Hant" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="翻譯工具" />
  <title>翻譯工具集</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    [data-theme="dark"]{
      --bg:#0a0c10;
      --card:rgba(255,255,255,0.05);
      --card-hover:rgba(255,255,255,0.09);
      --text:rgba(255,255,255,0.92);
      --muted:rgba(255,255,255,0.5);
      --accent:#6ee7b7;
      --border:rgba(255,255,255,0.08);
    }
    [data-theme="light"]{
      --bg:#f4f5f7;
      --card:rgba(0,0,0,0.03);
      --card-hover:rgba(0,0,0,0.07);
      --text:rgba(0,0,0,0.88);
      --muted:rgba(0,0,0,0.45);
      --accent:#059669;
      --border:rgba(0,0,0,0.08);
    }

    *{margin:0;padding:0;box-sizing:border-box}
    body{
      background:var(--bg);
      color:var(--text);
      font-family:Inter,"Noto Sans TC",system-ui,-apple-system,sans-serif;
      -webkit-font-smoothing:antialiased;
      min-height:100dvh;
      display:flex;
      flex-direction:column;
      align-items:center;
      padding:env(safe-area-inset-top) 16px 32px;
    }

    /* Header */
    .header{
      text-align:center;
      margin:48px 0 36px;
    }
    .header h1{
      font-size:28px;
      font-weight:700;
      letter-spacing:-0.02em;
      margin-bottom:8px;
    }
    .header p{
      font-size:14px;
      color:var(--muted);
    }

    /* Theme toggle */
    .theme-btn{
      position:fixed;
      top:max(12px, env(safe-area-inset-top));
      right:16px;
      background:none;
      border:none;
      color:var(--muted);
      font-size:22px;
      cursor:pointer;
      z-index:10;
      padding:8px;
      border-radius:8px;
      transition:background 0.2s;
    }
    .theme-btn:hover{background:var(--card-hover)}

    /* Grid */
    .grid{
      display:grid;
      grid-template-columns:1fr;
      gap:14px;
      width:100%;
      max-width:480px;
    }

    /* App card */
    .app-card{
      display:flex;
      align-items:center;
      gap:16px;
      padding:18px 20px;
      background:var(--card);
      border:1px solid var(--border);
      border-radius:16px;
      text-decoration:none;
      color:var(--text);
      transition:background 0.2s, border-color 0.2s, transform 0.15s;
      cursor:pointer;
    }
    .app-card:hover{
      background:var(--card-hover);
      border-color:var(--accent);
      transform:translateY(-2px);
    }
    .app-card:active{
      transform:scale(0.98);
    }

    .app-icon{
      width:56px;
      height:56px;
      border-radius:14px;
      object-fit:cover;
      flex-shrink:0;
      background:var(--card);
    }

    .app-info{
      flex:1;
      min-width:0;
    }
    .app-name{
      font-size:17px;
      font-weight:600;
      margin-bottom:3px;
    }
    .app-desc{
      font-size:13px;
      color:var(--muted);
    }
    .app-arrow{
      font-size:18px;
      color:var(--muted);
      flex-shrink:0;
    }

    /* Footer */
    .footer{
      margin-top:auto;
      padding-top:48px;
      text-align:center;
      font-size:12px;
      color:var(--muted);
      opacity:0.6;
    }

    @media(min-width:600px){
      .grid{
        grid-template-columns:repeat(2, 1fr);
        max-width:640px;
      }
    }
  </style>
</head>
<body>
  <button class="theme-btn" id="themeBtn" title="切換主題">◑</button>

  <div class="header">
    <h1>翻譯工具集</h1>
    <p>選擇語言方向，開始翻譯</p>
  </div>

  <div class="grid" id="appGrid">
    <!-- Apps are rendered by JS from the config below -->
  </div>

  <div class="footer">Powered by OpenAI</div>

  <script>
    // ============================================================
    // APP 清單 — 新增 APP 只要在這裡加一筆即可
    // ============================================================
    const APPS = [
      {
        name: '圖片辨譯',
        desc: '',
        url: 'https://kenkenno1.github.io/translator-hub/辨譯_fixed.html',
        icon: '',
        flag: '🔍',
        customIcon: `<span class="app-icon" style="display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#6ee7b7 0%,#3b82f6 100%);border-radius:14px"><svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg></span>`,
      },
      {
        name: '多語翻譯',
        desc: '中文 ↔ 11種語言（可選）',
        url: 'https://kenkenno1.github.io/multi-lang/',
        icon: 'https://kenkenno1.github.io/multi-lang/icon-180.png?v=2',
        flag: '🌐',
      },
      {
        name: '中日口譯',
        desc: '',
        url: 'https://kenkenno1.github.io/meeting-translator/',
        icon: 'https://kenkenno1.github.io/meeting-translator/icon-180.png?v=2',
        flag: '🤝',
      },
      {
        name: '中英口譯',
        desc: '',
        url: 'https://kenkenno1.github.io/EN-meeting/',
        icon: 'https://kenkenno1.github.io/EN-meeting/icon-180.png?v=1',
        flag: '🤝',
      },
      {
        name: '中韓口譯',
        desc: '',
        url: 'https://kenkenno1.github.io/meeting-translator-zh-ko/',
        icon: 'https://kenkenno1.github.io/meeting-translator-zh-ko/icon-180.png?v=1',
        flag: '🤝',
      },
      {
        name: '中泰口譯',
        desc: '',
        url: 'https://kenkenno1.github.io/meeting-translator-zh-th/',
        icon: 'https://kenkenno1.github.io/meeting-translator-zh-th/icon-180.png?v=1',
        flag: '🤝',
      },
      {
        name: '中菲口譯',
        desc: '',
        url: 'https://kenkenno1.github.io/meeting-translator-zh-fil/',
        icon: 'https://kenkenno1.github.io/meeting-translator-zh-fil/icon-180.png?v=1',
        flag: '🤝',
      },
      {
        name: '中越口譯',
        desc: '',
        url: 'https://kenkenno1.github.io/meeting-translator-zh-vie/',
        icon: 'https://kenkenno1.github.io/meeting-translator-zh-vie/icon-180.png?v=1',
        flag: '🤝',
      },
      {
        name: '文件檔翻譯（格式精準）',
        desc: '',
        url: 'https://kenkenno1.github.io/Office-translator-precision/v19-3.html',
        icon: '',
        flag: '🗂️',
      },
      {
        name: '文件檔翻譯（可潤稿）',
        desc: '',
        url: 'https://kenkenno1.github.io/Office-translator-precision/v19-4.html',
        icon: '',
        flag: '🗂️',
      },
      {
        name: '文件檔翻譯（圖文辨識翻譯）',
        desc: '',
        url: 'https://kenkenno1.github.io/text_and_OCR_translation/translated-app-v5-%E9%9B%99%E8%BB%8COCR%E6%95%B4%E5%90%88__Codex.html',
        icon: '',
        flag: '📄',
      },
      {
        name: '標籤整合',
        desc: '',
        url: 'https://kenkenno1.github.io/Tagmerge_Preanalysis/PPT_v21_0_PreAnalysis.html',
        icon: '',
        flag: '🏷️',
      },
      {
        name: '文件速譯',
        desc: '16 語言 AI 翻譯 · PPTX/DOCX/XLSX · OCR · TM/術語庫',
        url: 'https://kenkenno1.github.io/SpeedCAT/',
        icon: '',
        flag: '🌸',
      },
      {
        name: '文宣多語翻譯',
        desc: '',
        url: 'https://kenkenno1.github.io/TAITRA-Translator/%E6%96%87%E5%AE%A3%E5%A4%9A%E8%AA%9E%E8%A8%80%E7%BF%BB%E8%AD%AF_v1.9.html',
        icon: '',
        flag: '📄',
      },
      {
        name: '疾風譯 · PPTX',
        desc: '',
        url: 'https://kenkenno1.github.io/Speed-PPTX-Translator/%E7%96%BE%E9%A2%A8%E8%AD%AFv7.html',
        icon: '',
        flag: '💨',
      },
      {
        name: '中日英速譯',
        desc: '',
        url: 'https://kenkenno1.github.io/Trilingual-AI/Gemini%20%E4%B8%89%E8%AA%9E(AI%E5%8A%A9%E6%89%8B).html',
        icon: '',
        flag: '🔤',
      },
      {
        name: '圖片辨譯 · 動物版',
        desc: '',
        url: 'https://kenkenno1.github.io/Pet-OCR/%E8%BE%A8%E8%AD%AF_%E5%8B%95%E7%89%A9%E7%89%88.html',
        icon: '',
        flag: '🐱',
      },
    ];

    // Render cards
    const grid = document.getElementById('appGrid');
    APPS.forEach(app => {
      const a = document.createElement('a');
      a.className = 'app-card';
      a.href = app.url;
      a.target = '_blank';
      a.rel = 'noopener';
      a.innerHTML = `
        ${app.customIcon
          ? app.customIcon
          : app.icon
            ? `<img class="app-icon" src="${app.icon}" alt="${app.name}" loading="lazy" />`
            : `<span class="app-icon" style="display:flex;align-items:center;justify-content:center;font-size:28px">${app.flag}</span>`}
        <div class="app-info">
          <div class="app-name">${app.flag} ${app.name}</div>
          <div class="app-desc">${app.desc}</div>
        </div>
        <span class="app-arrow">›</span>
      `;
      grid.appendChild(a);
    });

    // Theme toggle
    const themeBtn = document.getElementById('themeBtn');
    let theme = localStorage.getItem('hub_theme') || 'dark';
    applyTheme(theme);

    themeBtn.addEventListener('click', () => {
      theme = theme === 'dark' ? 'light' : 'dark';
      applyTheme(theme);
    });

    function applyTheme(t) {
      theme = t;
      document.documentElement.setAttribute('data-theme', t);
      localStorage.setItem('hub_theme', t);
      themeBtn.textContent = t === 'dark' ? '◑' : '◐';
    }
  </script>
</body>
</html>
